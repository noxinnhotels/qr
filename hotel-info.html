<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Info</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sand:#f5efe6; --sand2:#ede3d4; --palm:#2d5a3d; --palm-light:#3d7a52;
    --gold:#c4973a; --gold-light:#e8c070; --ocean:#2a6b8a;
    --white:#fdfaf6; --text:#2c2416; --text-soft:#6b5b45; --radius:16px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Jost',sans-serif;background:var(--sand);color:var(--text);min-height:100vh;}
  #guest-view{display:block;} #admin-view{display:none;}

  /* HERO */
  .hero{background:linear-gradient(160deg,var(--palm) 0%,#1a3d2a 60%,var(--ocean) 100%);padding:48px 24px 56px;text-align:center;position:relative;overflow:hidden;}
  .hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");}
  .hero-leaves{position:absolute;font-size:80px;opacity:.08;pointer-events:none;}
  .hero-leaves.l1{top:-10px;left:-20px;transform:rotate(-30deg);}
  .hero-leaves.l2{top:20px;right:-10px;transform:rotate(20deg);}
  .hero-leaves.l3{bottom:-20px;left:40%;transform:rotate(10deg);}
  .hotel-label{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:300;letter-spacing:4px;text-transform:uppercase;color:var(--gold-light);margin-bottom:8px;}
  .hero h1{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:300;color:var(--white);line-height:1.1;margin-bottom:8px;}
  .hero-sub{font-size:13px;color:rgba(255,255,255,.55);letter-spacing:1px;font-weight:300;}

  /* LANG */
  .lang-bar{background:var(--white);padding:10px 20px;display:flex;gap:4px;overflow-x:auto;border-bottom:1px solid var(--sand2);scrollbar-width:none;}
  .lang-bar::-webkit-scrollbar{display:none;}
  .lang-btn{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1.5px solid transparent;background:none;font-family:'Jost',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:var(--text-soft);transition:all .2s;}
  .lang-btn.active{background:var(--palm);color:white;border-color:var(--palm);}
  .lang-btn:hover:not(.active){border-color:var(--palm-light);color:var(--palm);}

  /* NAV */
  .nav-tabs{background:var(--white);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.06);}
  .nav-tabs::-webkit-scrollbar{display:none;}
  .nav-tab{flex-shrink:0;padding:14px 20px;border:none;background:none;font-family:'Jost',sans-serif;font-size:13px;font-weight:400;color:var(--text-soft);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:7px;}
  .nav-tab.active{color:var(--palm);border-bottom-color:var(--palm);font-weight:500;}

  /* CONTENT */
  .content-area{padding:20px 16px 80px;max-width:600px;margin:0 auto;}
  .section-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:var(--text);margin-bottom:4px;}
  .section-sub{font-size:12px;color:var(--text-soft);margin-bottom:20px;letter-spacing:.5px;}

  /* CARDS */
  .card{background:var(--white);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);border:1px solid rgba(196,151,58,.12);transition:box-shadow .2s;}
  .card:hover{box-shadow:0 4px 16px rgba(0,0,0,.09);}
  .card-header{padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;}
  .card-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .icon-restaurant{background:linear-gradient(135deg,#fde8c8,#f5c87a);}
  .icon-bar{background:linear-gradient(135deg,#c8e0fd,#7ab2f5);}
  .icon-pool{background:linear-gradient(135deg,#c8f0fd,#7ad4f5);}
  .icon-spa{background:linear-gradient(135deg,#e8c8fd,#c87af5);}
  .card-info{flex:1;min-width:0;}
  .card-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card-hours{font-size:12px;color:var(--text-soft);margin-top:2px;display:flex;align-items:center;gap:5px;}
  .status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .status-dot.open{background:#4caf7d;} .status-dot.closed{background:#e57373;}
  .card-arrow{color:var(--text-soft);font-size:18px;transition:transform .2s;flex-shrink:0;}
  .card.expanded .card-arrow{transform:rotate(90deg);}
  .card-body{display:none;padding:0 18px 16px;border-top:1px solid var(--sand2);}
  .card.expanded .card-body{display:block;}
  .card-desc{font-size:13.5px;color:var(--text-soft);line-height:1.65;margin:12px 0;}
  .detail-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--sand2);font-size:13px;}
  .detail-row:last-child{border-bottom:none;}
  .detail-label{font-weight:500;color:var(--palm);min-width:90px;flex-shrink:0;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding-top:1px;}
  .detail-val{color:var(--text);flex:1;}

  /* EVENTS */
  .event-card{background:var(--white);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;border:1px solid rgba(196,151,58,.12);box-shadow:0 2px 8px rgba(0,0,0,.05);}
  .event-date-strip{background:linear-gradient(90deg,var(--palm),var(--palm-light));padding:10px 16px;display:flex;align-items:center;gap:12px;}
  .event-date-box{text-align:center;background:rgba(255,255,255,.15);border-radius:8px;padding:6px 10px;min-width:44px;}
  .event-day{font-size:20px;font-weight:500;color:white;line-height:1;}
  .event-month{font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,.8);text-transform:uppercase;}
  .event-title-wrap{flex:1;}
  .event-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:white;line-height:1.2;}
  .event-time{font-size:12px;color:rgba(255,255,255,.75);margin-top:2px;}
  .event-body{padding:12px 16px;}
  .event-desc{font-size:13px;color:var(--text-soft);line-height:1.6;}
  .event-location{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:12px;color:var(--palm);background:rgba(45,90,61,.08);padding:4px 10px;border-radius:20px;}

  /* SERVICES */
  .service-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .service-item{background:var(--white);border-radius:var(--radius);padding:16px;border:1px solid rgba(196,151,58,.12);box-shadow:0 2px 8px rgba(0,0,0,.04);}
  .service-item .s-icon{font-size:24px;margin-bottom:8px;}
  .service-item .s-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;}
  .service-item .s-info{font-size:12px;color:var(--text-soft);line-height:1.5;white-space:pre-line;}

  /* LOADING / EMPTY */
  .loading-state{text-align:center;padding:48px 24px;color:var(--text-soft);}
  .loading-spinner{width:36px;height:36px;border:3px solid var(--sand2);border-top-color:var(--palm);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .empty-state{text-align:center;padding:48px 24px;color:var(--text-soft);}
  .empty-state .e-icon{font-size:40px;margin-bottom:12px;opacity:.5;}
  .empty-state p{font-size:14px;}

  /* FAB */
  .admin-fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--gold);color:white;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(196,151,58,.4);z-index:100;transition:transform .2s,box-shadow .2s;}
  .admin-fab:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(196,151,58,.5);}

  /* ADMIN */
  .admin-header{background:linear-gradient(135deg,#1a2e22,var(--palm));padding:20px 20px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .admin-header h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:white;flex:1;}
  .btn-back{background:rgba(255,255,255,.15);border:none;color:white;padding:8px 14px;border-radius:20px;font-family:'Jost',sans-serif;font-size:13px;cursor:pointer;transition:background .2s;}
  .btn-back:hover{background:rgba(255,255,255,.25);}
  .btn-logout{background:rgba(229,115,115,.25);border:none;color:#ffcdd2;padding:8px 14px;border-radius:20px;font-family:'Jost',sans-serif;font-size:13px;cursor:pointer;}
  .btn-logout:hover{background:rgba(229,115,115,.4);}
  .admin-tabs{background:white;display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--sand2);position:sticky;top:0;z-index:10;}
  .admin-tabs::-webkit-scrollbar{display:none;}
  .admin-tab{flex-shrink:0;padding:12px 18px;border:none;background:none;font-family:'Jost',sans-serif;font-size:13px;color:var(--text-soft);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap;}
  .admin-tab.active{color:var(--palm);border-bottom-color:var(--palm);font-weight:500;}
  .admin-content{padding:16px;max-width:700px;margin:0 auto;}
  .admin-list-item{background:white;border-radius:12px;padding:14px 16px;margin-bottom:8px;border:1px solid var(--sand2);display:flex;align-items:center;gap:12px;}
  .ali-icon{font-size:22px;flex-shrink:0;}
  .ali-info{flex:1;min-width:0;}
  .ali-name{font-size:15px;font-weight:500;color:var(--text);}
  .ali-sub{font-size:12px;color:var(--text-soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ali-actions{display:flex;gap:6px;}
  .btn-edit,.btn-del{border:none;border-radius:8px;padding:7px 12px;font-family:'Jost',sans-serif;font-size:12px;cursor:pointer;transition:opacity .2s;}
  .btn-edit{background:rgba(45,90,61,.1);color:var(--palm);}
  .btn-del{background:rgba(229,115,115,.12);color:#c0392b;}
  .btn-edit:hover,.btn-del:hover{opacity:.75;}
  .btn-add{width:100%;padding:13px;background:var(--palm);color:white;border:none;border-radius:12px;font-family:'Jost',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:16px;transition:opacity .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-add:hover{opacity:.88;}
  .hotel-name-edit{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;border-radius:8px;padding:4px 10px;font-family:'Jost',sans-serif;font-size:13px;cursor:pointer;transition:background .2s;}
  .hotel-name-edit:hover{background:rgba(255,255,255,.2);}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;padding:24px 20px 40px;animation:slideUp .3s ease;}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--text);margin-bottom:20px;}
  .form-group{margin-bottom:14px;}
  .form-label{display:block;font-size:12px;font-weight:500;color:var(--text-soft);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
  .form-input,.form-textarea{width:100%;padding:11px 14px;border:1.5px solid var(--sand2);border-radius:10px;font-family:'Jost',sans-serif;font-size:14px;color:var(--text);background:white;transition:border-color .2s;outline:none;}
  .form-input:focus,.form-textarea:focus{border-color:var(--palm);}
  .form-textarea{resize:vertical;min-height:70px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .lang-section-title{font-size:13px;font-weight:500;color:var(--palm);margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--sand2);}
  .lang-tag{background:var(--sand2);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;margin-right:4px;}
  .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .btn-save{flex:1;padding:13px;background:var(--palm);color:white;border:none;border-radius:10px;font-family:'Jost',sans-serif;font-size:14px;font-weight:500;cursor:pointer;}
  .btn-save:disabled{opacity:.5;cursor:not-allowed;}
  .btn-cancel{padding:13px 20px;background:var(--sand2);color:var(--text);border:none;border-radius:10px;font-family:'Jost',sans-serif;font-size:14px;cursor:pointer;}
  .icon-picker{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
  .icon-btn{font-size:22px;padding:5px;border:2px solid transparent;border-radius:8px;background:none;cursor:pointer;transition:all .15s;line-height:1;}
  .icon-btn.selected{border-color:var(--palm);background:rgba(45,90,61,.1);}

  /* LOGIN */
  .login-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:center;justify-content:center;padding:20px;}
  .login-overlay.open{display:flex;}
  .login-box{background:var(--white);border-radius:20px;padding:32px 28px;width:100%;max-width:360px;text-align:center;}
  .login-icon{font-size:40px;margin-bottom:12px;}
  .login-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;margin-bottom:6px;}
  .login-sub{font-size:13px;color:var(--text-soft);margin-bottom:24px;}
  .login-error{font-size:13px;color:#c0392b;margin-top:8px;min-height:20px;}

  /* TOAST */
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#2c2416;color:white;padding:10px 22px;border-radius:24px;font-size:13px;z-index:500;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-thumb{background:var(--sand2);border-radius:4px;}
</style>
</head>

<!-- ═══ GUEST VIEW ═══ -->
<div id="guest-view">
  <div class="hero">
    <div class="hero-leaves l1">🌴</div>
    <div class="hero-leaves l2">🌿</div>
    <div class="hero-leaves l3">🍃</div>
    <div class="hotel-label">HOTEL</div>
    <h1 id="hotel-name-display">Paradise Resort</h1>
    <div class="hero-sub" id="hero-subtitle">Your tropical escape awaits</div>
  </div>
  <div class="lang-bar" id="lang-bar"></div>
  <div class="nav-tabs" id="nav-tabs"></div>
  <div class="content-area" id="content-area">
    <div class="loading-state"><div class="loading-spinner"></div><p>Yükleniyor…</p></div>
  </div>
  <button class="admin-fab" onclick="openAdminLogin()">⚙️</button>
</div>

<!-- ═══ ADMIN VIEW ═══ -->
<div id="admin-view">
  <div class="admin-header">
    <button class="btn-back" onclick="showGuest()">← Misafir</button>
    <h2>Yönetim Paneli</h2>
    <button class="hotel-name-edit" onclick="editHotelName()">✏️ Otel Adı</button>
    <button class="btn-logout" onclick="doLogout()">Çıkış</button>
  </div>
  <div class="admin-tabs" id="admin-tabs"></div>
  <div class="admin-content" id="admin-content"></div>
</div>

<!-- Login -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div class="login-icon">🌴</div>
    <div class="login-title">Admin Girişi</div>
    <div class="login-sub">E-posta ve şifrenizi girin</div>
    <input type="email" class="form-input" id="login-email" placeholder="admin@hotel.com" style="margin-bottom:10px" onkeydown="if(event.key==='Enter')doLogin()">
    <input type="password" class="form-input" id="login-pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-error" id="login-error"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn-cancel" style="flex:1" onclick="closeLogin()">İptal</button>
      <button class="btn-save" style="flex:1" id="login-btn" onclick="doLogin()">Giriş</button>
    </div>
  </div>
</div>

<!-- Item Modal -->
<div class="modal-overlay" id="item-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Öğe Ekle</div>
    <div id="modal-form-body"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">İptal</button>
      <button class="btn-save" id="save-btn" onclick="saveItem()">Kaydet</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  cs:{restaurants:'Restaurace & Bary',pools:'Bazén & Spa',events:'Akce',services:'Služby',open:'Otevřeno',closed:'Zavřeno',location:'Místo',phone:'Telefon',hours:'Otevírací doba',dress_code:'Dress code',reservation:'Rezervace',no_items:'Zatím žádný obsah.',hero_sub:'Váš tropický ráj čeká'},
  pl:{restaurants:'Restauracje i Bary',pools:'Basen i Spa',events:'Wydarzenia',services:'Usługi',open:'Otwarte',closed:'Zamknięte',location:'Lokalizacja',phone:'Telefon',hours:'Godziny otwarcia',dress_code:'Strój',reservation:'Rezerwacja',no_items:'Brak treści.',hero_sub:'Twój tropikalny raj czeka'},
  ro:{restaurants:'Restaurante & Baruri',pools:'Piscină & Spa',events:'Evenimente',services:'Servicii',open:'Deschis',closed:'Închis',location:'Locație',phone:'Telefon',hours:'Program',dress_code:'Ținută',reservation:'Rezervare',no_items:'Niciun conținut.',hero_sub:'Evadarea ta tropicală te așteaptă'},
};

// ── STATE ──
let currentLang = (() => { const n=(navigator.language||'en').slice(0,2).toLowerCase(); return LANGS.map(l=>l.code).includes(n)?n:'en'; })();
let activeTab='restaurants', adminTab='restaurants';
let editingItem=null, editingType=null, editingCategory=null;
let isAdmin=false, toastTimer=null;
let cache={outlets:[],events:[],services:[],hotelName:'Paradise Resort'};

const t = k => (UI[currentLang]||UI.en)[k]||k;
const getName = item => item.names?.[currentLang]||item.names?.en||item.names?.tr||Object.values(item.names||{})[0]||'';
const getDesc  = item => item.descs?.[currentLang]||item.descs?.en||item.descs?.tr||'';
const getInfo  = item => item.infos?.[currentLang]||item.infos?.en||item.infos?.tr||'';

function isOpen(h) {
  if (!h) return null;
  const m=h.match(/(\d{1,2}):(\d{2})\s*[–\-]\s*(\d{1,2}):(\d{2})/);
  if (!m) return null;
  const now=new Date(), cur=now.getHours()*60+now.getMinutes();
  const op=+m[1]*60+ +m[2], cl=+m[3]*60+ +m[4];
  return cl>op ? cur>=op&&cur<cl : cur>=op||cur<cl;
}

// ── FETCH ──
async function fetchAll() {
  const [o,e,s,c] = await Promise.all([
    sb.from('outlets').select('*').order('sort_order').order('created_at'),
    sb.from('events').select('*').order('event_date').order('event_time'),
    sb.from('services').select('*').order('sort_order').order('created_at'),
    sb.from('hotel_config').select('*'),
  ]);
  if (o.data) cache.outlets=o.data;
  if (e.data) cache.events=e.data;
  if (s.data) cache.services=s.data;
  if (c.data) { const r=c.data.find(x=>x.key==='hotel_name'); if(r) cache.hotelName=r.value; }
}

// ── REALTIME ──
function setupRealtime() {
  sb.channel('hotel-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'outlets'},  async()=>{await fetchAll();renderGuest();if(isAdmin)renderAdmin();})
    .on('postgres_changes',{event:'*',schema:'public',table:'events'},   async()=>{await fetchAll();renderGuest();if(isAdmin)renderAdmin();})
    .on('postgres_changes',{event:'*',schema:'public',table:'services'}, async()=>{await fetchAll();renderGuest();if(isAdmin)renderAdmin();})
    .on('postgres_changes',{event:'*',schema:'public',table:'hotel_config'},async()=>{await fetchAll();renderGuest();})
    .subscribe();
}

// ── GUEST RENDER ──
function renderGuest() {
  document.getElementById('hotel-name-display').textContent = cache.hotelName;
  document.getElementById('hero-subtitle').textContent = t('hero_sub');

  document.getElementById('lang-bar').innerHTML = LANGS.map(l=>
    `<button class="lang-btn ${l.code===currentLang?'active':''}" onclick="setLang('${l.code}')">${l.label}</button>`
  ).join('');

  document.getElementById('nav-tabs').innerHTML = CATEGORIES.map(c=>
    `<button class="nav-tab ${c.id===activeTab?'active':''}" onclick="setTab('${c.id}')">${c.icon} ${t(c.id)}</button>`
  ).join('');

  const ca=document.getElementById('content-area');
  ca.innerHTML='';

  if (activeTab==='restaurants'||activeTab==='pools') {
    const items=cache.outlets.filter(i=>i.category===activeTab);
    ca.innerHTML=`<div class="section-title">${t(activeTab)}</div><div class="section-sub">${items.length} ${activeTab==='restaurants'?'🌴':'🌊'}</div>`;
    if (!items.length){ca.innerHTML+=emptyHTML();return;}
    items.forEach(item=>{
      const os=isOpen(item.hours);
      const statusHtml=os!==null?`<span class="status-dot ${os?'open':'closed'}"></span>${os?t('open'):t('closed')} · `:'';
      const iconCls=activeTab==='restaurants'?(['🍹','🍸','🥂'].includes(item.icon)?'icon-bar':'icon-restaurant'):(['💆','🧖','🛁'].includes(item.icon)?'icon-spa':'icon-pool');
      const d=document.createElement('div'); d.className='card';
      d.innerHTML=`
        <div class="card-header" onclick="this.closest('.card').classList.toggle('expanded')">
          <div class="card-icon ${iconCls}">${item.icon}</div>
          <div class="card-info">
            <div class="card-name">${getName(item)}</div>
            <div class="card-hours">${statusHtml}${item.hours||''}</div>
          </div>
          <div class="card-arrow">›</div>
        </div>
        <div class="card-body">
          ${getDesc(item)?`<div class="card-desc">${getDesc(item)}</div>`:''}
          ${item.hours?`<div class="detail-row"><span class="detail-label">${t('hours')}</span><span class="detail-val">${item.hours}</span></div>`:''}
          ${item.location?`<div class="detail-row"><span class="detail-label">${t('location')}</span><span class="detail-val">${item.location}</span></div>`:''}
          ${item.phone?`<div class="detail-row"><span class="detail-label">${t('phone')}</span><span class="detail-val">📞 ${item.phone}</span></div>`:''}
          ${item.dress_code?`<div class="detail-row"><span class="detail-label">${t('dress_code')}</span><span class="detail-val">${item.dress_code}</span></div>`:''}
          ${item.reservation?`<div class="detail-row"><span class="detail-label">${t('reservation')}</span><span class="detail-val">${item.reservation}</span></div>`:''}
        </div>`;
      ca.appendChild(d);
    });
  }
  else if (activeTab==='events') {
    ca.innerHTML=`<div class="section-title">${t('events')}</div><div class="section-sub">${cache.events.length} 🎉</div>`;
    if (!cache.events.length){ca.innerHTML+=emptyHTML();return;}
    cache.events.forEach(ev=>{
      const d=new Date(ev.event_date+'T12:00:00');
      const card=document.createElement('div'); card.className='event-card';
      card.innerHTML=`
        <div class="event-date-strip">
          <div class="event-date-box"><div class="event-day">${d.getDate()}</div><div class="event-month">${d.toLocaleString(currentLang,{month:'short'}).toUpperCase()}</div></div>
          <div class="event-title-wrap">
            <div class="event-title">${ev.icon} ${getName(ev)}</div>
            <div class="event-time">🕐 ${(ev.event_time||'').slice(0,5)}</div>
          </div>
        </div>
        <div class="event-body">
          ${getDesc(ev)?`<div class="event-desc">${getDesc(ev)}</div>`:''}
          ${ev.location?`<span class="event-location">📍 ${ev.location}</span>`:''}
        </div>`;
      ca.appendChild(card);
    });
  }
  else if (activeTab==='services') {
    ca.innerHTML=`<div class="section-title">${t('services')}</div><div class="section-sub">${cache.services.length} 🛎️</div>`;
    if (!cache.services.length){ca.innerHTML+=emptyHTML();return;}
    const grid=document.createElement('div'); grid.className='service-grid';
    cache.services.forEach(s=>{
      const el=document.createElement('div'); el.className='service-item';
      el.innerHTML=`<div class="s-icon">${s.icon}</div><div class="s-name">${getName(s)}</div><div class="s-info">${getInfo(s)}</div>`;
      grid.appendChild(el);
    });
    ca.appendChild(grid);
  }
}

const emptyHTML = () => `<div class="empty-state"><div class="e-icon">🌴</div><p>${t('no_items')}</p></div>`;
function setLang(c){currentLang=c;renderGuest();}
function setTab(id){activeTab=id;renderGuest();}

// ── ADMIN RENDER ──
function renderAdmin() {
  document.getElementById('admin-tabs').innerHTML = CATEGORIES.map(c=>
    `<button class="admin-tab ${c.id===adminTab?'active':''}" onclick="setAdminTab('${c.id}')">${c.icon} ${UI.tr[c.id]}</button>`
  ).join('');

  const ac=document.getElementById('admin-content');
  ac.innerHTML='';

  const addBtn=(label,fn)=>{const b=document.createElement('button');b.className='btn-add';b.innerHTML=`<span>+</span> ${label}`;b.onclick=fn;ac.appendChild(b);};
  const noItem=()=>{ac.innerHTML+=`<div style="text-align:center;color:#aaa;padding:32px;font-size:14px">Henüz öğe yok</div>`;};

  if (adminTab==='restaurants'||adminTab==='pools') {
    addBtn(adminTab==='restaurants'?'Restoran / Outlet Ekle':'Havuz / Spa Ekle', ()=>openModal('outlet',adminTab,null));
    const items=cache.outlets.filter(i=>i.category===adminTab);
    if (!items.length) noItem();
    items.forEach(item=>{
      const el=document.createElement('div'); el.className='admin-list-item';
      el.innerHTML=`
        <div class="ali-icon">${item.icon}</div>
        <div class="ali-info">
          <div class="ali-name">${item.names?.tr||item.names?.en||'—'}</div>
          <div class="ali-sub">${item.hours||'—'} · ${item.location||'—'}</div>
        </div>
        <div class="ali-actions">
          <button class="btn-edit" onclick="openModal('outlet','${adminTab}','${item.id}')">✏️</button>
          <button class="btn-del" onclick="deleteItem('outlet','${item.id}')">🗑️</button>
        </div>`;
      ac.appendChild(el);
    });
  }
  else if (adminTab==='events') {
    addBtn('Etkinlik Ekle',()=>openModal('event','events',null));
    if (!cache.events.length) noItem();
    cache.events.forEach(ev=>{
      const el=document.createElement('div'); el.className='admin-list-item';
      el.innerHTML=`
        <div class="ali-icon">${ev.icon}</div>
        <div class="ali-info">
          <div class="ali-name">${ev.names?.tr||ev.names?.en||'—'}</div>
          <div class="ali-sub">${ev.event_date} ${(ev.event_time||'').slice(0,5)} · ${ev.location||'—'}</div>
        </div>
        <div class="ali-actions">
          <button class="btn-edit" onclick="openModal('event','events','${ev.id}')">✏️</button>
          <button class="btn-del" onclick="deleteItem('event','${ev.id}')">🗑️</button>
        </div>`;
      ac.appendChild(el);
    });
  }
  else if (adminTab==='services') {
    addBtn('Hizmet Ekle',()=>openModal('service','services',null));
    if (!cache.services.length) noItem();
    cache.services.forEach(svc=>{
      const el=document.createElement('div'); el.className='admin-list-item';
      el.innerHTML=`
        <div class="ali-icon">${svc.icon}</div>
        <div class="ali-info">
          <div class="ali-name">${svc.names?.tr||svc.names?.en||'—'}</div>
          <div class="ali-sub">${(svc.infos?.tr||svc.infos?.en||'—').replace(/\n/g,' ')}</div>
        </div>
        <div class="ali-actions">
          <button class="btn-edit" onclick="openModal('service','services','${svc.id}')">✏️</button>
          <button class="btn-del" onclick="deleteItem('service','${svc.id}')">🗑️</button>
        </div>`;
      ac.appendChild(el);
    });
  }
}

function setAdminTab(id){adminTab=id;renderAdmin();}

// ── MODAL ──
function openModal(type,category,id) {
  editingType=type; editingCategory=category;
  let ex=null;
  if (id) {
    if(type==='outlet') ex=cache.outlets.find(i=>i.id===id);
    else if(type==='event') ex=cache.events.find(i=>i.id===id);
    else ex=cache.services.find(i=>i.id===id);
  }
  editingItem=ex||null;

  const iconVal=ex?.icon||(type==='outlet'?'🍽️':type==='event'?'🎉':'🛎️');
  document.getElementById('modal-title').textContent=ex
    ?(type==='outlet'?'Outlet Düzenle':type==='event'?'Etkinlik Düzenle':'Hizmet Düzenle')
    :(type==='outlet'?'Outlet Ekle':type==='event'?'Etkinlik Ekle':'Hizmet Ekle');

  let html=`
    <div class="form-group">
      <div class="form-label">İkon</div>
      <div class="icon-picker">${ICONS.map(ic=>`<button type="button" class="icon-btn${ic===iconVal?' selected':''}" data-icon="${ic}" onclick="pickIcon('${ic}',this)">${ic}</button>`).join('')}</div>
      <input type="hidden" id="f-icon" value="${iconVal}">
    </div>`;

  if (type==='outlet') {
    html+=`
      <div class="form-row">
        <div class="form-group"><div class="form-label">Çalışma Saatleri</div><input class="form-input" id="f-hours" value="${ex?.hours||''}" placeholder="09:00 – 22:00"></div>
        <div class="form-group"><div class="form-label">Dahili / Tel</div><input class="form-input" id="f-phone" value="${ex?.phone||''}" placeholder="1001"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><div class="form-label">Konum</div><input class="form-input" id="f-location" value="${ex?.location||''}" placeholder="Ground Floor"></div>
        <div class="form-group"><div class="form-label">Kıyafet Kodu</div><input class="form-input" id="f-dress" value="${ex?.dress_code||''}" placeholder="Smart casual"></div>
      </div>
      <div class="form-group"><div class="form-label">Rezervasyon</div><input class="form-input" id="f-reservation" value="${ex?.reservation||''}" placeholder="Zorunlu / Required"></div>`;
  } else if (type==='event') {
    html+=`
      <div class="form-row">
        <div class="form-group"><div class="form-label">Tarih</div><input type="date" class="form-input" id="f-date" value="${ex?.event_date||new Date().toISOString().split('T')[0]}"></div>
        <div class="form-group"><div class="form-label">Saat</div><input type="time" class="form-input" id="f-time" value="${(ex?.event_time||'20:00').slice(0,5)}"></div>
      </div>
      <div class="form-group"><div class="form-label">Konum</div><input class="form-input" id="f-location" value="${ex?.location||''}" placeholder="Beach Stage"></div>`;
  }

  const descLabel=type==='service'?'Bilgi / Detay':'Açıklama';
  const descKey=type==='service'?'infos':'descs';

  html+=`<div class="lang-section-title">🌍 Çok Dilli İsimler</div>`;
  LANGS.forEach(l=>{
    html+=`<div class="form-group" style="margin-bottom:8px">
      <div class="form-label"><span class="lang-tag">${l.label}</span>${l.name}</div>
      <input class="form-input" id="fn-${l.code}" value="${ex?.names?.[l.code]||''}" placeholder="${l.name}...">
    </div>`;
  });
  html+=`<div class="lang-section-title">🌍 Çok Dilli ${descLabel}</div>`;
  LANGS.forEach(l=>{
    html+=`<div class="form-group" style="margin-bottom:8px">
      <div class="form-label"><span class="lang-tag">${l.label}</span>${l.name}</div>
      <textarea class="form-textarea" id="fd-${l.code}" rows="2" placeholder="${l.name}...">${ex?.[descKey]?.[l.code]||''}</textarea>
    </div>`;
  });

  document.getElementById('modal-form-body').innerHTML=html;
  document.getElementById('item-modal').classList.add('open');
}

function pickIcon(icon,btn) {
  document.getElementById('f-icon').value=icon;
  document.querySelectorAll('.icon-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}
function closeModal(){document.getElementById('item-modal').classList.remove('open');editingItem=null;editingType=null;editingCategory=null;}

async function saveItem() {
  const btn=document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='Kaydediliyor…';

  const icon=document.getElementById('f-icon').value;
  const names={}, descs={};
  LANGS.forEach(l=>{
    names[l.code]=document.getElementById(`fn-${l.code}`)?.value||'';
    descs[l.code]=document.getElementById(`fd-${l.code}`)?.value||'';
  });

  if (!names.tr&&!names.en){showToast('⚠️ TR veya EN isim girin!');btn.disabled=false;btn.textContent='Kaydet';return;}

  let error;
  if (editingType==='outlet') {
    const obj={category:editingCategory,icon,names,descs,
      hours:document.getElementById('f-hours')?.value||'',
      location:document.getElementById('f-location')?.value||'',
      phone:document.getElementById('f-phone')?.value||'',
      dress_code:document.getElementById('f-dress')?.value||'',
      reservation:document.getElementById('f-reservation')?.value||''};
    ({error}=editingItem ? await sb.from('outlets').update(obj).eq('id',editingItem.id) : await sb.from('outlets').insert(obj));
  }
  else if (editingType==='event') {
    const obj={icon,names,descs,
      event_date:document.getElementById('f-date')?.value,
      event_time:document.getElementById('f-time')?.value,
      location:document.getElementById('f-location')?.value||''};
    ({error}=editingItem ? await sb.from('events').update(obj).eq('id',editingItem.id) : await sb.from('events').insert(obj));
  }
  else if (editingType==='service') {
    const obj={icon,names,infos:descs};
    ({error}=editingItem ? await sb.from('services').update(obj).eq('id',editingItem.id) : await sb.from('services').insert(obj));
  }

  btn.disabled=false; btn.textContent='Kaydet';
  if (error){showToast('❌ '+error.message);return;}
  closeModal();
  await fetchAll();
  renderAdmin();
  renderGuest();
  showToast('✓ Kaydedildi');
}

async function deleteItem(type,id) {
  if (!confirm('Bu öğeyi silmek istediğinizden emin misiniz?')) return;
  let error;
  if(type==='outlet') ({error}=await sb.from('outlets').delete().eq('id',id));
  else if(type==='event') ({error}=await sb.from('events').delete().eq('id',id));
  else ({error}=await sb.from('services').delete().eq('id',id));
  if(error){showToast('❌ '+error.message);return;}
  await fetchAll();
  renderAdmin(); renderGuest();
  showToast('🗑️ Silindi');
}

// ── HOTEL NAME ──
async function editHotelName() {
  const name=prompt('Otel adını girin:',cache.hotelName);
  if (!name?.trim()) return;
  const {error}=await sb.from('hotel_config').upsert({key:'hotel_name',value:name.trim()});
  if(error){showToast('❌ '+error.message);return;}
  cache.hotelName=name.trim();
  renderGuest();
  showToast('✓ Otel adı güncellendi');
}

// ── AUTH ──
function openAdminLogin() {
  document.getElementById('login-email').value='';
  document.getElementById('login-pw').value='';
  document.getElementById('login-error').textContent='';
  document.getElementById('login-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('login-email').focus(),300);
}
function closeLogin(){document.getElementById('login-overlay').classList.remove('open');}

async function doLogin() {
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-pw').value;
  const btn=document.getElementById('login-btn');
  if(!email||!pw){document.getElementById('login-error').textContent='E-posta ve şifre gerekli.';return;}
  btn.disabled=true; btn.textContent='Giriş yapılıyor…';
  const {error}=await sb.auth.signInWithPassword({email,password:pw});
  btn.disabled=false; btn.textContent='Giriş';
  if(error){document.getElementById('login-error').textContent='Hatalı e-posta veya şifre!';return;}
  isAdmin=true;
  closeLogin();
  document.getElementById('guest-view').style.display='none';
  document.getElementById('admin-view').style.display='block';
  adminTab='restaurants';
  renderAdmin();
}

async function doLogout() {
  await sb.auth.signOut();
  isAdmin=false;
  document.getElementById('admin-view').style.display='none';
  document.getElementById('guest-view').style.display='block';
  renderGuest();
  showToast('Çıkış yapıldı');
}

function showGuest(){
  document.getElementById('admin-view').style.display='none';
  document.getElementById('guest-view').style.display='block';
}

// ── TOAST ──
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}

// ── INIT ──
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(session) isAdmin=true;
  await fetchAll();
  renderGuest();
  setupRealtime();
})();
</script>
