<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Info</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--sand:#f0f6f9;--sand2:#d6e8f0;--palm:#1a5f7a;--palm-light:#2a85a8;--gold:#c4973a;--gold-light:#e8c070;--ocean:#0d3d52;--white:#f8fcfe;--text:#0d2b38;--text-soft:#3d6a7f;--radius:16px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--sand);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;}
#guest-view{display:block;}#admin-view{display:none;}
.hero{background:linear-gradient(160deg,#0d3d52 0%,#1a5f7a 45%,#2a9bbf 100%);padding:48px 24px 56px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");}
.hero-leaves{position:absolute;font-size:80px;opacity:.08;pointer-events:none;}
.hero-leaves.l1{top:-10px;left:-20px;transform:rotate(-30deg);}
.hero-leaves.l2{top:20px;right:-10px;transform:rotate(20deg);}
.hero-leaves.l3{bottom:-20px;left:40%;transform:rotate(10deg);}
.hotel-label{font-family:'Playfair Display',serif;font-size:14px;font-weight:400;letter-spacing:5px;text-transform:uppercase;color:var(--gold-light);margin-bottom:10px;}
.hero h1{font-family:'Playfair Display',serif;font-size:44px;font-weight:600;color:var(--white);line-height:1.1;margin-bottom:10px;}
.hero-sub{font-size:15px;color:rgba(255,255,255,.6);letter-spacing:1.5px;font-weight:300;}
/* ── CONTACT FAB ── */
.contact-fabs{position:fixed;bottom:24px;left:24px;display:flex;flex-direction:column;gap:10px;z-index:100;}
.cfab{width:50px;height:50px;border-radius:50%;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.18);transition:transform .2s;}
.cfab:hover{transform:scale(1.1);}
.cfab-wa{background:#25d366;color:white;}
.cfab-ph{background:var(--palm);color:white;}

/* ── ANNOUNCEMENT BANNER (geliştirilmiş) ── */
.ann-banner-wrap{overflow:hidden;max-height:0;transition:max-height .4s ease;}
.ann-banner-wrap.show{max-height:120px;}
.announcement-banner{display:flex;padding:13px 16px;gap:10px;align-items:flex-start;}
.announcement-banner.info{background:linear-gradient(90deg,#e3f4fb,#f0faff);border-left:4px solid #2a9bbf;}
.announcement-banner.warning{background:linear-gradient(90deg,#fff8e1,#fffde7);border-left:4px solid #f9a825;}
.announcement-banner.urgent{background:linear-gradient(90deg,#ffebee,#fff5f5);border-left:4px solid #e53935;}
.announcement-banner.success{background:linear-gradient(90deg,#f1f8e9,#f9ffe0);border-left:4px solid #7cb342;}
.ann-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:2px 8px;border-radius:20px;margin-right:2px;flex-shrink:0;align-self:center;}
.ann-badge.info{background:#2a9bbf;color:white;}
.ann-badge.warning{background:#f9a825;color:white;}
.ann-badge.urgent{background:#e53935;color:white;animation:pulse-badge 1.5s infinite;}
.ann-badge.success{background:#7cb342;color:white;}
@keyframes pulse-badge{0%,100%{opacity:1;}50%{opacity:.6;}}
.ann-body{flex:1;}
.ann-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px;}
.ann-title.info{color:#1a7a9a;}.ann-title.warning{color:#c17900;}.ann-title.urgent{color:#b71c1c;}.ann-title.success{color:#558b2f;}
.ann-msg{font-size:14px;line-height:1.5;color:var(--text);}

/* ── CHECK-IN/OUT SEKMESİ ── */
.info-card{background:var(--white);border-radius:var(--radius);padding:20px;margin-bottom:12px;border:1px solid rgba(26,95,122,.12);box-shadow:0 2px 8px rgba(0,0,0,.04);}
.info-card-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.info-card-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,rgba(26,95,122,.12),rgba(42,155,191,.2));display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.info-card-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:var(--text);}
.checkin-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.checkin-box{background:linear-gradient(135deg,var(--palm),var(--palm-light));border-radius:14px;padding:16px;text-align:center;color:white;}
.checkin-box.out{background:linear-gradient(135deg,var(--ocean),#1a5f7a);}
.checkin-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;opacity:.8;margin-bottom:6px;font-weight:500;}
.checkin-time{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;line-height:1;}
.rules-list{list-style:none;}
.rules-list li{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--sand2);font-size:14px;line-height:1.5;}
.rules-list li:last-child{border-bottom:none;}
.rules-list li::before{content:'›';color:var(--palm);font-size:18px;font-weight:700;flex-shrink:0;margin-top:-1px;}

/* ── ADMIN DASHBOARD ── */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.dash-card{background:white;border-radius:14px;padding:16px;border:1px solid var(--sand2);text-align:center;}
.dash-card .dc-icon{font-size:28px;margin-bottom:6px;}
.dash-card .dc-val{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--palm);line-height:1;}
.dash-card .dc-label{font-size:12px;color:var(--text-soft);margin-top:4px;}
.dash-card.urgent .dc-val{color:#e53935;}
.dash-section{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;margin:18px 0 10px;color:var(--text);}
.dash-activity{background:white;border-radius:12px;border:1px solid var(--sand2);}
.da-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--sand2);font-size:13.5px;}
.da-row:last-child{border-bottom:none;}
.da-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.da-dot.unread{background:var(--gold);}
.da-dot.info{background:#2a9bbf;}.da-dot.warning{background:#f9a825;}.da-dot.urgent{background:#e53935;}
.da-text{flex:1;}
.da-time{font-size:11px;color:var(--text-soft);}
.lang-bar{background:var(--white);padding:10px 20px;display:flex;gap:4px;overflow-x:auto;border-bottom:1px solid var(--sand2);scrollbar-width:none;}
.lang-bar::-webkit-scrollbar{display:none;}
.lang-btn{flex-shrink:0;padding:4px;border-radius:50%;border:2.5px solid transparent;background:none;font-size:22px;cursor:pointer;transition:all .2s;line-height:1;width:36px;height:36px;display:flex;align-items:center;justify-content:center;}
.lang-btn.active{border-color:var(--palm);background:rgba(26,95,122,.1);}.lang-btn:hover:not(.active){border-color:var(--sand2);background:var(--sand2);}
.nav-tabs{background:var(--white);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{flex-shrink:0;padding:13px 14px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:400;color:var(--text-soft);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.nav-tab.active{color:var(--palm);border-bottom-color:var(--palm);font-weight:500;}
.content-area{padding:16px 16px 80px;max-width:620px;margin:0 auto;}
.section-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:600;color:var(--text);margin-bottom:6px;}
.section-sub{font-size:13px;color:var(--text-soft);margin-bottom:20px;letter-spacing:.5px;}
.card{background:var(--white);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);border:1px solid rgba(196,151,58,.12);transition:box-shadow .2s;}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.09);}
.card-photo{width:100%;height:160px;object-fit:cover;display:block;cursor:pointer;}
.card-header{padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;}
.card-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.icon-restaurant{background:linear-gradient(135deg,#fde8c8,#f5c87a);}
.icon-bar{background:linear-gradient(135deg,#c8e0fd,#7ab2f5);}
.icon-pool{background:linear-gradient(135deg,#c8f0fd,#7ad4f5);}
.icon-spa{background:linear-gradient(135deg,#e8c8fd,#c87af5);}
.card-info{flex:1;min-width:0;}
.card-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-hours{font-size:13px;color:var(--text-soft);margin-top:3px;display:flex;align-items:center;gap:5px;}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.status-dot.open{background:#4caf7d;}.status-dot.closed{background:#e57373;}
.card-arrow{color:var(--text-soft);font-size:18px;transition:transform .2s;flex-shrink:0;}
.card.expanded .card-arrow{transform:rotate(90deg);}
.card-body{display:none;padding:0 18px 16px;border-top:1px solid var(--sand2);}
.card.expanded .card-body{display:block;}
.card-desc{font-size:15px;color:var(--text-soft);line-height:1.7;margin:14px 0;}
.detail-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--sand2);font-size:14px;}
.detail-row:last-child{border-bottom:none;}
.detail-label{font-weight:500;color:var(--palm);min-width:90px;flex-shrink:0;font-size:11.5px;text-transform:uppercase;letter-spacing:.8px;padding-top:2px;}
.detail-val{color:var(--text);flex:1;}
.event-card{background:var(--white);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;border:1px solid rgba(196,151,58,.12);box-shadow:0 2px 8px rgba(0,0,0,.05);}
.event-photo{width:100%;height:140px;object-fit:cover;display:block;cursor:pointer;}
.event-date-strip{background:linear-gradient(90deg,var(--ocean),var(--palm));padding:10px 16px;display:flex;align-items:center;gap:12px;}
.event-date-box{text-align:center;background:rgba(255,255,255,.15);border-radius:8px;padding:6px 10px;min-width:44px;}
.event-day{font-size:24px;font-weight:700;color:white;line-height:1;}
.event-month{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.85);text-transform:uppercase;}
.event-title-wrap{flex:1;}
.event-title{font-family:'Playfair Display',serif;font-size:21px;font-weight:600;color:white;line-height:1.2;}
.event-time{font-size:13px;color:rgba(255,255,255,.8);margin-top:3px;}
.event-body{padding:12px 16px;}
.event-desc{font-size:14.5px;color:var(--text-soft);line-height:1.7;}
.event-location{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:13px;color:var(--palm);background:rgba(26,95,122,.08);padding:5px 12px;border-radius:20px;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-month-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;}
.cal-nav{background:none;border:1.5px solid var(--sand2);border-radius:8px;padding:4px 12px;font-size:16px;cursor:pointer;color:var(--text-soft);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:16px;}
.cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--text-soft);padding:6px 0;text-transform:uppercase;}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;font-size:14px;position:relative;gap:2px;}
.cal-day.other-month{color:var(--text-soft);opacity:.3;}
.cal-day.today{background:var(--palm);color:white;font-weight:600;}
.cal-day.has-event{font-weight:600;cursor:pointer;}
.cal-day.has-event:not(.today){background:rgba(26,95,122,.1);color:var(--palm);}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);}
.cal-day.today .cal-dot{background:var(--gold-light);}
.cal-event-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--white);border-radius:10px;margin-bottom:6px;border:1px solid var(--sand2);}
.service-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.service-item{background:var(--white);border-radius:var(--radius);padding:16px;border:1px solid rgba(196,151,58,.12);}
.service-item .s-icon{font-size:24px;margin-bottom:8px;}
.service-item .s-name{font-size:14.5px;font-weight:600;margin-bottom:5px;}
.service-item .s-info{font-size:13.5px;color:var(--text-soft);line-height:1.6;white-space:pre-line;}
.gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.gallery-item{border-radius:12px;overflow:hidden;position:relative;aspect-ratio:4/3;cursor:pointer;}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.gallery-item:hover img{transform:scale(1.05);}
.gallery-caption{position:absolute;bottom:0;left:0;right:0;padding:8px 10px;background:linear-gradient(transparent,rgba(0,0,0,.6));color:white;font-size:13.5px;font-family:'Playfair Display',serif;font-weight:600;}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:400;align-items:center;justify-content:center;}
.lightbox.open{display:flex;}
.lightbox img{max-width:94vw;max-height:88vh;object-fit:contain;border-radius:8px;}
.lb-close{position:absolute;top:16px;right:20px;background:none;border:none;color:white;font-size:28px;cursor:pointer;}
.request-form{background:var(--white);border-radius:var(--radius);padding:20px;border:1px solid rgba(196,151,58,.12);}
.request-form h3{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;margin-bottom:6px;}
.request-form p{font-size:15px;color:var(--text-soft);margin-bottom:18px;line-height:1.65;}
.request-success{text-align:center;padding:24px;}
.request-success .rs-icon{font-size:40px;margin-bottom:10px;}
.fi{width:100%;padding:12px 16px;border:1.5px solid var(--sand2);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:white;outline:none;margin-bottom:10px;transition:border-color .2s;}
.fi:focus{border-color:var(--palm);}
textarea.fi{resize:vertical;min-height:100px;margin-bottom:10px;}
.btn-submit{width:100%;padding:14px;background:var(--palm);color:white;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:.3px;}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;}
.loading-state{text-align:center;padding:48px 24px;color:var(--text-soft);}
.loading-spinner{width:36px;height:36px;border:3px solid var(--sand2);border-top-color:var(--palm);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-state{text-align:center;padding:48px 24px;color:var(--text-soft);}
.empty-state .e-icon{font-size:40px;margin-bottom:12px;opacity:.5;}
.admin-fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--gold);color:white;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(196,151,58,.4);z-index:100;transition:transform .2s;}
.admin-fab:hover{transform:scale(1.1);}
.admin-header{background:linear-gradient(135deg,var(--ocean),var(--palm));padding:14px 14px 10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.admin-header h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:white;flex:1;}
.btn-back{background:rgba(255,255,255,.15);border:none;color:white;padding:7px 12px;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;}
.btn-logout{background:rgba(229,115,115,.25);border:none;color:#ffcdd2;padding:7px 12px;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;}
.hotel-name-edit{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;border-radius:8px;padding:4px 10px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;}
.admin-tabs{background:white;display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--sand2);position:sticky;top:0;z-index:10;}
.admin-tabs::-webkit-scrollbar{display:none;}
.admin-tab{flex-shrink:0;padding:11px 12px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text-soft);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap;}
.admin-tab.active{color:var(--palm);border-bottom-color:var(--palm);font-weight:500;}
.admin-content{padding:14px;max-width:720px;margin:0 auto;}
.ali{background:white;border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--sand2);display:flex;align-items:center;gap:10px;}
.ali-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.ali-ph{width:44px;height:44px;border-radius:8px;background:var(--sand2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ali-info{flex:1;min-width:0;}
.ali-name{font-size:15px;font-weight:600;color:var(--text);}
.ali-sub{font-size:12.5px;color:var(--text-soft);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ali-act{display:flex;gap:5px;}
.be,.bd{border:none;border-radius:8px;padding:6px 10px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;}
.be{background:rgba(26,95,122,.1);color:var(--palm);}
.bd{background:rgba(229,115,115,.12);color:#c0392b;}
.btn-add{width:100%;padding:12px;background:var(--palm);color:white;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-add:hover{opacity:.88;}
.req-item{background:white;border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--sand2);border-left:4px solid transparent;}
.req-item.unread{border-left-color:var(--gold);}
.req-item.resolved{border-left-color:#4caf7d;opacity:.75;}
.req-top{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap;}
.req-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px;}
.req-badge.unread{background:#fff8e1;color:#f57f17;}
.req-badge.read{background:var(--sand2);color:var(--text-soft);}
.req-badge.resolved{background:#e8f5e9;color:#2e7d32;}
.req-time{font-size:11px;color:var(--text-soft);margin-left:auto;}
.req-msg{font-size:15px;line-height:1.65;}
.req-act{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.brq{border:none;border-radius:8px;padding:6px 12px;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;font-weight:500;}
.unread-badge{background:var(--gold);color:white;border-radius:10px;font-size:10px;font-weight:700;padding:1px 6px;margin-left:4px;}
.ann-type-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.ann-type-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--sand2);background:none;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;}
.ann-type-btn.sel{background:var(--palm);color:white;border-color:var(--palm);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;padding:24px 20px 40px;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;margin-bottom:22px;}
.fg{margin-bottom:12px;}

async function fetchAll(){
  const[o,e,s,cf,a,r]=await Promise.all([
    sb.from('outlets').select('*').order('sort_order').order('created_at'),
    sb.from('events').select('*').order('event_date').order('event_time'),
    sb.from('services').select('*').order('sort_order').order('created_at'),
    sb.from('hotel_config').select('*'),
    sb.from('announcements').select('*').eq('is_active',true).order('created_at',{ascending:false}).limit(1),
    sb.from('guest_requests').select('*').order('created_at',{ascending:false}),
  ]);
  if(o.data)C.outlets=o.data;
  if(e.data)C.events=e.data;
  if(s.data)C.services=s.data;
  if(cf.data){
    cf.data.forEach(row=>{C.config[row.key]=row.value;});
    if(C.config.hotel_name)C.hotelName=C.config.hotel_name;
  }
  if(a.data)C.announcements=a.data;
  if(r.data)C.requests=r.data;
}

function renderAnn(){
  const a=C.announcements[0];
  const wrap=document.getElementById('ann-banner-wrap');
  const banner=document.getElementById('ann-banner');
  if(!a){wrap.classList.remove('show');return;}
  const msg=a.messages?.[lang]||a.messages?.en||a.messages?.tr||'';
  if(!msg){wrap.classList.remove('show');return;}
  const type=a.type||'info';
  const badgeLabels={info:t('ann_info'),warning:t('ann_warning'),urgent:t('ann_urgent'),success:t('ann_success')};
  const titleLabels={info:'ℹ️',warning:'⚠️',urgent:'🚨',success:'✅'};
  document.getElementById('ann-text').textContent=msg;
  const badge=document.getElementById('ann-badge');
  badge.textContent=badgeLabels[type]||t('ann_info');
  badge.className=`ann-badge ${type}`;
  const title=document.getElementById('ann-title');
  title.textContent=titleLabels[type]||'ℹ️';
  title.className=`ann-title ${type}`;
  banner.className=`announcement-banner ${type}`;
  wrap.classList.add('show');
}

          ${item.location?`<div class="detail-row"><span class="detail-label">${t('location')}</span><span class="detail-val">${item.location}</span></div>`:''}
          ${item.phone?`<div class="detail-row"><span class="detail-label">${t('phone')}</span><span class="detail-val">📞 ${item.phone}</span></div>`:''}
          ${item.dress_code?`<div class="detail-row"><span class="detail-label">${t('dress_code')}</span><span class="detail-val">${item.dress_code}</span></div>`:''}

  else if(tab==='events'){

    hdr.innerHTML=`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div><div class="section-title">${t('events')}</div></div>
        <div style="display:flex;gap:6px">
          <button onclick="evView='list';setTab('events')" style="${fBtnStyle(evView!=='cal')}">☰</button>
          <button onclick="evView='cal';setTab('events')" style="${fBtnStyle(evView==='cal')}">📅</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none">
        <button onclick="evDateFilter='today';setTab('events')" style="${fBtnStyle(evDateFilter==='today')}">
          ✨ ${t('ev_today')} ${todayEvs.length>0?`<span style="background:var(--gold);color:white;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:4px">${todayEvs.length}</span>`:''}
        </button>
        <button onclick="evDateFilter='upcoming';setTab('events')" style="${fBtnStyle(evDateFilter==='upcoming')}">
          🗓 ${t('ev_upcoming')} ${upcomingEvs.length>0?`<span style="background:rgba(26,95,122,.15);color:var(--palm);border-radius:10px;padding:1px 7px;font-size:11px;margin-left:4px">${upcomingEvs.length}</span>`:''}

        <button onclick="evDateFilter='all';setTab('events')" style="${fBtnStyle(evDateFilter==='all')}">
          📋 ${t('ev_all')}
        </button>
      </div>`;

  else if(tab==='services'){
    ca.innerHTML=`<div class="section-title">${t('services')}</div><div class="section-sub">${C.services.length} 🛎️</div>`;
    if(!C.services.length){ca.innerHTML+=emp();return;}
    const g=document.createElement('div');g.className='service-grid';
    C.services.forEach(s=>{const el=document.createElement('div');el.className='service-item';el.innerHTML=`<div class="s-icon">${s.icon}</div><div class="s-name">${gn(s)}</div><div class="s-info">${gi(s)}</div>`;g.appendChild(el);});

  else if(tab==='gallery'){

function renderDashboard(ac){
  const unread=C.requests.filter(r=>r.status==='unread').length;

  const annActive=C.announcements.length;
  const todayStr=new Date().toISOString().split('T')[0];
  const todayEvs=C.events.filter(e=>e.event_date===todayStr).length;

  // Stat kartları
  const grid1=document.createElement('div');grid1.className='dash-grid';

    '<div class="dash-card '+(unread>0?'urgent':'')+'"><div class="dc-icon">📝</div><div class="dc-val">'+unread+'</div><div class="dc-label">Okunmamış Talep</div></div>'+

  grid2.innerHTML=
    '<div class="dash-card"><div class="dc-icon">🍽️</div><div class="dc-val">'+C.outlets.filter(o=>o.category==='restaurants').length+'</div><div class="dc-label">Restoran</div></div>'+

    act1.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-soft);font-size:13px">Henüz talep yok</div>';
  } else {
    C.requests.slice(0,5).forEach(r=>{
      const d=new Date(r.created_at);
      const ts=d.toLocaleDateString('tr-TR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      const msg=r.message.length>60?r.message.slice(0,60)+'…':r.message;
      const room=r.room_number?'<span style="font-size:11px;color:var(--text-soft)">🚪'+r.room_number+'</span>':'';
      const row=document.createElement('div');row.className='da-row';
      row.innerHTML='<div class="da-dot '+(r.status==='unread'?'unread':'')+'"></div><div class="da-text">'+msg+' '+room+'</div><div class="da-time">'+ts+'</div>';
      act1.appendChild(row);
    });
  }
  ac.appendChild(act1);

  // Aktif Duyurular
  const sec2=document.createElement('div');sec2.className='dash-section';sec2.textContent='Aktif Duyurular';ac.appendChild(sec2);
  const act2=document.createElement('div');act2.className='dash-activity';
  if(!C.announcements.length){
    act2.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-soft);font-size:13px">Aktif duyuru yok</div>';
  } else {
    C.announcements.forEach(a=>{
      const msg=(a.messages&&(a.messages.tr||a.messages.en)||'').slice(0,70);
      const row=document.createElement('div');row.className='da-row';
      row.innerHTML='<div class="da-dot '+(a.type||'info')+'"></div><div class="da-text">'+msg+'</div><div class="da-time">'+((a.type||'').toUpperCase())+'</div>';
      act2.appendChild(row);
    });
  }
  ac.appendChild(act2);
}

function renderHotelInfoAdmin(ac){

  logoSection.appendChild(logoLbl);
  const logoPreviewWrap=document.createElement('div');
  logoPreviewWrap.style.cssText='display:flex;align-items:center;gap:12px;margin-top:6px;flex-wrap:wrap';
  const logoPreview=document.createElement('img');
  logoPreview.id='admin-logo-preview';
  logoPreview.style.cssText='max-height:60px;max-width:140px;object-fit:contain;border-radius:8px;background:#f0f6f9;padding:6px;border:1px solid var(--sand2);'+(C.config.hotel_logo?'':'display:none');
  if(C.config.hotel_logo)logoPreview.src=C.config.hotel_logo;
  const logoFileBtn=document.createElement('label');
  logoFileBtn.className='btn-save';logoFileBtn.style.cssText='padding:8px 16px;font-size:13px;cursor:pointer;margin:0';
  logoFileBtn.textContent='📁 Seç';
  const logoInput=document.createElement('input');
  logoInput.type='file';logoInput.accept='image/*';logoInput.style.display='none';
  logoInput.onchange=async function(){
    const file=logoInput.files[0];if(!file)return;
    logoFileBtn.textContent='Yükleniyor…';
    const url=await uploadPhoto(file,'hotel','logo');
    if(url){
      C.config.hotel_logo=url;
      await sb.from('hotel_config').upsert({key:'hotel_logo',value:url});
      logoPreview.src=url;logoPreview.style.display='';
      renderG();showToast('✓ Logo yüklendi');
    } else {showToast('❌ Yükleme başarısız');}
    logoFileBtn.textContent='📁 Seç';
  };
  logoFileBtn.appendChild(logoInput);
  const logoRemoveBtn=document.createElement('button');
  logoRemoveBtn.className='bd';logoRemoveBtn.style.cssText='padding:8px 12px;font-size:13px';
  logoRemoveBtn.textContent='🗑️ Kaldır';
  logoRemoveBtn.style.display=C.config.hotel_logo?'':'none';
  logoRemoveBtn.onclick=async function(){
    await sb.from('hotel_config').delete().eq('key','hotel_logo');
    C.config.hotel_logo='';
    logoPreview.style.display='none';
    logoRemoveBtn.style.display='none';
    renderG();showToast('Logo kaldırıldı');
  };
  logoPreviewWrap.appendChild(logoPreview);
  logoPreviewWrap.appendChild(logoFileBtn);
  logoPreviewWrap.appendChild(logoRemoveBtn);
  logoSection.appendChild(logoPreviewWrap);
  ac.appendChild(logoSection);

  fields.forEach(function(f){
    const g=document.createElement('div');g.className='fg';g.style.marginBottom='14px';
    const lbl=document.createElement('div');lbl.className='fl';lbl.textContent=f.icon+' '+f.label;
    g.appendChild(lbl);
    let inp;
    if(f.textarea){
      inp=document.createElement('textarea');
      inp.className='fi2';inp.id='hf-'+f.key;inp.rows=3;
      inp.placeholder=f.placeholder;inp.style.resize='vertical';
      inp.value=C.config[f.key]||'';
    } else {
      inp=document.createElement('input');
      inp.className='fi2';inp.id='hf-'+f.key;
      inp.value=C.config[f.key]||'';inp.placeholder=f.placeholder;
    }
    g.appendChild(inp);
    ac.appendChild(g);
  });

  const saveBtn=document.createElement('button');
  saveBtn.className='btn-save';saveBtn.style.cssText='width:100%;margin-top:8px';
  saveBtn.textContent='Kaydet';
  saveBtn.onclick=async function(){
    saveBtn.disabled=true;saveBtn.textContent='Kaydediliyor…';
    const upserts=fields.map(function(f){return {key:f.key,value:(document.getElementById('hf-'+f.key).value||'').trim()};});
    const res=await sb.from('hotel_config').upsert(upserts);
    saveBtn.disabled=false;saveBtn.textContent='Kaydet';
    if(res.error){showToast('❌ '+res.error.message);return;}
    await fetchAll();renderG();showToast('✓ Otel bilgileri kaydedildi');
  };
  ac.appendChild(saveBtn);
}

function renderCal(ca){
  const mn=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  const fd=new Date(calY,calM,1).getDay();
  const dim=new Date(calY,calM+1,0).getDate();
  const today=new Date();
  const ed={};
  C.events.forEach(ev=>{const d=new Date(ev.event_date+'T12:00:00');if(d.getFullYear()===calY&&d.getMonth()===calM){const k=d.getDate();if(!ed[k])ed[k]=[];ed[k].push(ev);}});
  const off=(fd+6)%7;
  let days='';
  ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'].forEach(d=>{days+=`<div class="cal-dow">${d}</div>`;});
  for(let i=0;i<off;i++)days+=`<div class="cal-day other-month"></div>`;
  for(let d=1;d<=dim;d++){
    const it=d===today.getDate()&&calM===today.getMonth()&&calY===today.getFullYear();
    const he=ed[d];
    days+=`<div class="cal-day ${it?'today':''} ${he?'has-event':''}" ${he?`onclick="document.getElementById('ce${d}')?.scrollIntoView({behavior:'smooth',block:'center'})"`:''}>${d}${he?`<div class="cal-dot"></div>`:''}</div>`;
  }
  const w=document.createElement('div');
  w.innerHTML=`<div class="cal-header"><button class="cal-nav" onclick="calNav(-1)">‹</button><div class="cal-month-title">${mn[calM]} ${calY}</div><button class="cal-nav" onclick="calNav(1)">›</button></div><div class="cal-grid">${days}</div><div id="cal-list"></div>`;
  ca.appendChild(w);
  const cl=w.querySelector('#cal-list');
  const evs=C.events.filter(ev=>{const d=new Date(ev.event_date+'T12:00:00');return d.getFullYear()===calY&&d.getMonth()===calM;});
  if(!evs.length){cl.innerHTML=`<div style="text-align:center;color:var(--text-soft);padding:16px;font-size:13px">Bu ay etkinlik yok</div>`;return;}
  evs.forEach(ev=>{const d=new Date(ev.event_date+'T12:00:00');const r=document.createElement('div');r.className='cal-event-row';r.id=`ce${d.getDate()}`;r.innerHTML=`<div style="font-size:20px">${ev.icon}</div><div style="flex:1;font-size:14px;font-weight:500">${gn(ev)}</div><div style="font-size:12px;color:var(--text-soft)">${(ev.event_time||'').slice(0,5)}</div>`;cl.appendChild(r);});
}

function calNav(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}setTab('events');}

async function submitReq(){
  const msg=document.getElementById('req-msg')?.value?.trim();
  const room=document.getElementById('req-room')?.value?.trim();
  if(!msg){showToast('⚠️ Mesaj boş olamaz!');return;}
  const btn=document.getElementById('rsb');btn.disabled=true;btn.textContent='Gönderiliyor…';
  const{error}=await sb.from('guest_requests').insert({message:msg,room_number:room||null,lang,category:'general',status:'unread'});
  if(error){showToast('❌ '+error.message);btn.disabled=false;btn.textContent=t('rs');return;}
  document.getElementById('rfw').innerHTML=`<div class="request-success"><div class="rs-icon">✅</div><h3 style="font-family:'Playfair Display',serif;font-size:24px;margin-bottom:8px">${t('rts')}</h3><p style="color:var(--text-soft);font-size:13px">${t('rds')}</p></div>`;
}

const emp=()=>`<div class="empty-state"><div class="e-icon">🌴</div><p>${t('no_items')}</p></div>`;
function setLang(c){lang=c;renderG();}
function setTab(id){tab=id;renderG();}
function lb(url){document.getElementById('lb-img').src=url;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}

function renderA(){
  const unread=C.requests.filter(r=>r.status==='unread').length;
  document.getElementById('admin-tabs').innerHTML=ADMIN_TABS.map(c=>`<button class="admin-tab ${c.id===atab?'active':''}" onclick="setAtab('${c.id}')">${c.icon} ${c.label}${c.id==='requests'&&unread>0?`<span class="unread-badge">${unread}</span>`:''}</button>`).join('');
  const ac=document.getElementById('admin-content');ac.innerHTML='';
  const addBtn=(lbl,fn)=>{const b=document.createElement('button');b.className='btn-add';b.innerHTML=`<span>+</span> ${lbl}`;b.onclick=fn;ac.appendChild(b);};
  const noItem=()=>{const d=document.createElement("div");d.style.cssText="text-align:center;color:#aaa;padding:32px;font-size:14px";d.textContent="Henüz öğe yok";ac.appendChild(d);};
  if(atab==='dashboard'){renderDashboard(ac);return;}
  if(atab==='hotelinfo'){renderHotelInfoAdmin(ac);return;}

  if(atab==='restaurants'||atab==='pools'){
    addBtn(atab==='restaurants'?'Restoran / Bar Ekle':'Havuz / Spa Ekle',()=>openModal('outlet',atab,null));
    const items=C.outlets.filter(i=>i.category===atab);
    if(!items.length)noItem();
    items.forEach(item=>{
      const el=document.createElement('div');el.className='ali';
      el.innerHTML=`${item.photo_url?`<img class="ali-thumb" src="${item.photo_url}" alt="">`:`<div class="ali-ph">${item.icon}</div>`}<div class="ali-info"><div class="ali-name">${item.names?.tr||item.names?.en||'—'}</div><div class="ali-sub">${item.hours||'—'} · ${item.location||'—'}</div></div><div class="ali-act"><button class="be" onclick="openModal('outlet','${atab}','${item.id}')">✏️</button><button class="bd" onclick="delItem('outlet','${item.id}')">🗑️</button></div>`;
      ac.appendChild(el);
    });
  }
  else if(atab==='events'){
    addBtn('Etkinlik Ekle',()=>openModal('event','events',null));
    if(!C.events.length)noItem();
    C.events.forEach(ev=>{
      const el=document.createElement('div');el.className='ali';
      el.innerHTML=`${ev.photo_url?`<img class="ali-thumb" src="${ev.photo_url}" alt="">`:`<div class="ali-ph">${ev.icon}</div>`}<div class="ali-info"><div class="ali-name">${ev.names?.tr||ev.names?.en||'—'}</div><div class="ali-sub">${ev.event_date} ${(ev.event_time||'').slice(0,5)} · ${ev.location||'—'}</div></div><div class="ali-act"><button class="be" onclick="openModal('event','events','${ev.id}')">✏️</button><button class="bd" onclick="delItem('event','${ev.id}')">🗑️</button></div>`;
      ac.appendChild(el);
    });
  }
  else if(atab==='services'){
    addBtn('Hizmet Ekle',()=>openModal('service','services',null));
    if(!C.services.length)noItem();
    C.services.forEach(svc=>{
      const el=document.createElement('div');el.className='ali';
      el.innerHTML=`<div class="ali-ph">${svc.icon}</div><div class="ali-info"><div class="ali-name">${svc.names?.tr||svc.names?.en||'—'}</div><div class="ali-sub">${(svc.infos?.tr||svc.infos?.en||'—').replace(/\n/g,' ')}</div></div><div class="ali-act"><button class="be" onclick="openModal('service','services','${svc.id}')">✏️</button><button class="bd" onclick="delItem('service','${svc.id}')">🗑️</button></div>`;
      ac.appendChild(el);
    });
  }
  else if(atab==='requests') renderReqAdmin(ac);
  else if(atab==='announcements') renderAnnAdmin(ac);
}

function renderReqAdmin(ac){
  const filters=['all','unread','read','resolved'];
  const labels={all:'Tümü',unread:'Okunmadı',read:'Okundu',resolved:'Çözüldü'};
  const fbar=document.createElement('div');fbar.style.cssText='display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;';
  filters.forEach(f=>{
    const cnt=f==='all'?C.requests.length:C.requests.filter(r=>r.status===f).length;
    const b=document.createElement('button');
    b.style.cssText=`padding:6px 14px;border-radius:20px;border:1.5px solid var(--sand2);background:${reqFilter===f?'var(--palm)':'none'};color:${reqFilter===f?'white':'var(--text-soft)'};font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;`;
    b.textContent=`${labels[f]} (${cnt})`;b.onclick=()=>{reqFilter=f;renderA();};fbar.appendChild(b);
  });
  ac.appendChild(fbar);
  const reqs=C.requests.filter(r=>reqFilter==='all'||r.status===reqFilter);
  if(!reqs.length){ac.innerHTML+=`<div style="text-align:center;color:#aaa;padding:32px;font-size:14px">Talep yok</div>`;return;}
  reqs.forEach(req=>{
    const el=document.createElement('div');el.className=`req-item ${req.status}`;
    const d=new Date(req.created_at);
    const ts=d.toLocaleDateString('tr-TR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    const bl={unread:'Okunmadı',read:'Okundu',resolved:'Çözüldü'};
    el.innerHTML=`<div class="req-top"><span class="req-badge ${req.status}">${bl[req.status]}</span>${req.room_number?`<span style="font-size:12px;color:var(--text-soft)">🚪 ${req.room_number}</span>`:''}<span style="font-size:11px;color:var(--text-soft)">🌐 ${(req.lang||'?').toUpperCase()}</span><span class="req-time">${ts}</span></div><div class="req-msg">${req.message}</div><div class="req-act">${req.status==='unread'?`<button class="brq" style="background:rgba(26,95,122,.1);color:var(--palm)" onclick="updReq('${req.id}','read')">✓ Okundu</button>`:''}${req.status!=='resolved'?`<button class="brq" style="background:#e8f5e9;color:#2e7d32" onclick="updReq('${req.id}','resolved')">✅ Çözüldü</button>`:''}${ `<button class="brq" style="background:rgba(229,115,115,.12);color:#c0392b" onclick="delReq('${req.id}')">🗑️</button>`}</div>`;
    ac.appendChild(el);
  });
}

async function updReq(id,status){await sb.from('guest_requests').update({status}).eq('id',id);await fetchAll();renderA();}
async function delReq(id){if(!confirm('Talebi sil?'))return;await sb.from('guest_requests').delete().eq('id',id);await fetchAll();renderA();}

function renderAnnAdmin(ac){
  const b=document.createElement('button');
  b.className='btn-add';
  b.innerHTML='<span>+</span> Yeni Duyuru';
  b.onclick=function(){openAnnModal(null);};
  ac.appendChild(b);
  const listWrap=document.createElement('div');
  ac.appendChild(listWrap);
  sb.from('announcements').select('*').order('created_at',{ascending:false}).then(function(res){
    const data=res.data;
    listWrap.innerHTML='';
    if(!data||!data.length){
      listWrap.innerHTML='<div style="text-align:center;color:#aaa;padding:32px;font-size:14px">Duyuru yok</div>';
      return;
    }
    data.forEach(function(ann){
      const el=document.createElement('div');el.className='ali';
      const msg=(ann.messages&&(ann.messages.tr||ann.messages.en)||'').slice(0,50);
      const activeBg=ann.is_active?'#e8f5e9':'var(--sand2)';
      const activeColor=ann.is_active?'#2e7d32':'var(--text-soft)';
      const activeLabel=ann.is_active?'Aktif':'Pasif';
      const annIcon=ANN_ICONS[ann.type]||'📢';
      const dateStr=new Date(ann.created_at).toLocaleDateString('tr-TR');
      const typeStr=(ann.type||'').toUpperCase();

      // İkon satırları
      const phDiv=document.createElement('div');phDiv.className='ali-ph';phDiv.textContent=annIcon;
      const infoDiv=document.createElement('div');infoDiv.className='ali-info';
      const nameDiv=document.createElement('div');nameDiv.className='ali-name';nameDiv.style.cssText='display:flex;align-items:center;gap:6px';
      nameDiv.textContent=msg;
      const badge=document.createElement('span');
      badge.style.cssText='font-size:10px;padding:2px 7px;border-radius:10px;background:'+activeBg+';color:'+activeColor;
      badge.textContent=activeLabel;
      nameDiv.appendChild(badge);
      const subDiv=document.createElement('div');subDiv.className='ali-sub';subDiv.textContent=typeStr+' · '+dateStr;
      infoDiv.appendChild(nameDiv);infoDiv.appendChild(subDiv);

      const actDiv=document.createElement('div');actDiv.className='ali-act';
      const btnToggle=document.createElement('button');btnToggle.className='be';
      btnToggle.textContent=ann.is_active?'⏸':'▶️';
      btnToggle.onclick=function(){toggleAnn(ann.id,ann.is_active);};
      const btnEdit=document.createElement('button');btnEdit.className='be';btnEdit.textContent='✏️';
      btnEdit.onclick=function(){openAnnModal(ann.id);};
      const btnDel=document.createElement('button');btnDel.className='bd';btnDel.textContent='🗑️';
      btnDel.onclick=function(){delAnn(ann.id);};
      actDiv.appendChild(btnToggle);actDiv.appendChild(btnEdit);actDiv.appendChild(btnDel);

      el.appendChild(phDiv);el.appendChild(infoDiv);el.appendChild(actDiv);
      listWrap.appendChild(el);
    });
  });
}

async function toggleAnn(id,cur){await sb.from('announcements').update({is_active:!cur}).eq('id',id);await fetchAll();renderA();renderAnn();showToast(cur?'Durduruldu':'Yayınlandı');}
async function delAnn(id){if(!confirm('Duyuruyu sil?'))return;await sb.from('announcements').delete().eq('id',id);await fetchAll();renderA();renderAnn();}

function openAnnModal(id){
  editType='announcement';
  editItem=null;
  if(id){sb.from('announcements').select('*').eq('id',id).single().then(({data})=>{editAnn=data;showAnnModal(data);});}
  else{editAnn=null;showAnnModal(null);}
}
function showAnnModal(ann){
  document.getElementById('modal-title').textContent=ann?'Duyuru Düzenle':'Yeni Duyuru';
  let html=`<div class="fg"><div class="fl">Tür</div><div class="ann-type-row">${ANN_TYPES.map(at=>`<button type="button" class="ann-type-btn ${(ann?.type||'info')===at.id?'sel':''}" onclick="selAnnType('${at.id}',this)">${at.label}</button>`).join('')}</div><input type="hidden" id="f-ann-type" value="${ann?.type||'info'}"></div><div class="lst">🌍 Mesaj (dil başına)</div>`;
  LANGS.forEach(l=>{html+=`<div class="fg" style="margin-bottom:8px"><div class="fl"><span class="ltag">${l.label}</span>${l.name}</div><input class="fi2" id="fann-${l.code}" value="${ann?.messages?.[l.code]||''}" placeholder="${l.name}..."></div>`;});
  document.getElementById('modal-form-body').innerHTML=html;
  document.getElementById('item-modal').classList.add('open');
}
function selAnnType(type,btn){document.getElementById('f-ann-type').value=type;document.querySelectorAll('.ann-type-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}

function setAtab(id){atab=id;renderA();}

function openModal(type,cat,id){
  editType=type;editCat=cat;pendingPhoto=null;
  let ex=null;
  if(id){if(type==='outlet')ex=C.outlets.find(i=>i.id===id);else if(type==='event')ex=C.events.find(i=>i.id===id);else ex=C.services.find(i=>i.id===id);}
  editItem=ex||null;
  const iv=ex?.icon||(type==='outlet'?'🍽️':type==='event'?'🎉':'🛎️');
  document.getElementById('modal-title').textContent=ex?(type==='outlet'?'Outlet Düzenle':type==='event'?'Etkinlik Düzenle':'Hizmet Düzenle'):(type==='outlet'?'Outlet Ekle':type==='event'?'Etkinlik Ekle':'Hizmet Ekle');

  let html=`<div class="fg"><div class="fl">İkon</div><div class="icon-picker">${ICONS.map(ic=>`<button type="button" class="icon-btn${ic===iv?' sel':''}" onclick="pickIcon('${ic}',this)">${ic}</button>`).join('')}</div><input type="hidden" id="f-icon" value="${iv}"></div>`;

  if(type!=='service'){
    html+=`<div class="fg"><div class="fl">📸 Fotoğraf</div>${ex?.photo_url?`<img class="photo-prev show" id="photo-prev" src="${ex.photo_url}">`:`<img class="photo-prev" id="photo-prev" src="">`}<button type="button" class="upload-btn" onclick="document.getElementById('pf').click()">📁 Fotoğraf Seç</button><input type="file" id="pf" accept="image/*" style="display:none" onchange="handlePhoto(this)">${ex?.photo_url?`<button type="button" style="width:100%;margin-top:6px;padding:8px;border:none;background:none;color:#c0392b;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer" onclick="removePhoto()">🗑️ Fotoğrafı Kaldır</button>`:''}</div>`;
  }
  if(type==='outlet'){
    html+=`<div class="fr"><div class="fg"><div class="fl">Çalışma Saatleri</div><input class="fi2" id="f-hours" value="${ex?.hours||''}" placeholder="09:00 – 22:00"></div><div class="fg"><div class="fl">Dahili / Tel</div><input class="fi2" id="f-phone" value="${ex?.phone||''}" placeholder="1001"></div></div><div class="fr"><div class="fg"><div class="fl">Konum</div><input class="fi2" id="f-location" value="${ex?.location||''}" placeholder="Ground Floor"></div><div class="fg"><div class="fl">Kıyafet Kodu</div><input class="fi2" id="f-dress" value="${ex?.dress_code||''}" placeholder="Smart casual"></div></div><div class="fg"><div class="fl">Rezervasyon</div><input class="fi2" id="f-reservation" value="${ex?.reservation||''}" placeholder="Zorunlu"></div>`;
  }else if(type==='event'){
    html+=`<div class="fr"><div class="fg"><div class="fl">Tarih</div><input type="date" class="fi2" id="f-date" value="${ex?.event_date||new Date().toISOString().split('T')[0]}"></div><div class="fg"><div class="fl">Saat</div><input type="time" class="fi2" id="f-time" value="${(ex?.event_time||'20:00').slice(0,5)}"></div></div><div class="fg"><div class="fl">Konum</div><input class="fi2" id="f-location" value="${ex?.location||''}" placeholder="Beach Stage"></div>`;
  }
  const dk=type==='service'?'infos':'descs';
  html+=`<div class="lst">🌍 İsimler</div>`;
  LANGS.forEach(l=>{html+=`<div class="fg" style="margin-bottom:8px"><div class="fl"><span class="ltag">${l.label}</span>${l.name}</div><input class="fi2" id="fn-${l.code}" value="${ex?.names?.[l.code]||''}" placeholder="${l.name}..."></div>`;});
  html+=`<div class="lst">🌍 ${type==='service'?'Bilgi':'Açıklama'}</div>`;
  LANGS.forEach(l=>{html+=`<div class="fg" style="margin-bottom:8px"><div class="fl"><span class="ltag">${l.label}</span>${l.name}</div><textarea class="fi2" id="fd-${l.code}" rows="2" placeholder="${l.name}...">${ex?.[dk]?.[l.code]||''}</textarea></div>`;});

  document.getElementById('modal-form-body').innerHTML=html;
  document.getElementById('item-modal').classList.add('open');
}

function pickIcon(ic,btn){document.getElementById('f-icon').value=ic;document.querySelectorAll('.icon-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}
function handlePhoto(inp){const f=inp.files[0];if(!f)return;pendingPhoto=f;const r=new FileReader();r.onload=e=>{const p=document.getElementById('photo-prev');if(p){p.src=e.target.result;p.classList.add('show');}};r.readAsDataURL(f);}
function removePhoto(){pendingPhoto='REMOVE';const p=document.getElementById('photo-prev');if(p){p.src='';p.classList.remove('show');}}

async function uploadPhoto(file,folder,id){
  const ext=file.name.split('.').pop();
  const path=`${folder}/${id}.${ext}`;
  const{error}=await sb.storage.from(BUCKET).upload(path,file,{upsert:true,contentType:file.type});
  if(error){console.error(error);return null;}
  return sb.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;
}

function closeModal(){document.getElementById('item-modal').classList.remove('open');editItem=null;editType=null;editCat=null;editAnn=null;pendingPhoto=null;}

async function saveItem(){
  if(editType==='announcement'){
    const type=document.getElementById('f-ann-type')?.value||'info';
    const messages={};
    LANGS.forEach(l=>{
      const el=document.getElementById('fann-'+l.code);
      if(el&&el.value.trim()) messages[l.code]=el.value.trim();
    });
    console.log('Saving announcement:',{type,messages,editAnn});
    if(!Object.keys(messages).length){showToast('⚠️ En az bir dilde mesaj girin!');return;}
    const btn=document.getElementById('save-btn');btn.disabled=true;btn.textContent='Kaydediliyor…';
    let res;
    if(editAnn){
      res=await sb.from('announcements').update({type,messages,updated_at:new Date().toISOString()}).eq('id',editAnn.id);
    } else {
      res=await sb.from('announcements').insert([{type,messages,is_active:true}]);
    }
    console.log('Save result:',res);
    btn.disabled=false;btn.textContent='Kaydet';
    if(res.error){showToast('❌ '+res.error.message);console.error('Ann error:',res.error);return;}
    closeModal();await fetchAll();renderA();renderAnn();showToast('✓ Duyuru kaydedildi');return;
  }

  const btn=document.getElementById('save-btn');btn.disabled=true;btn.textContent='Kaydediliyor…';
  const icon=document.getElementById('f-icon').value;
  const names={},descs={};
  LANGS.forEach(l=>{names[l.code]=document.getElementById(`fn-${l.code}`)?.value||'';descs[l.code]=document.getElementById(`fd-${l.code}`)?.value||'';});
  if(!names.tr&&!names.en){showToast('⚠️ TR veya EN isim girin!');btn.disabled=false;btn.textContent='Kaydet';return;}

  let photoUrl=editItem?.photo_url||null;
  const tmpId=editItem?.id||crypto.randomUUID();
  if(pendingPhoto==='REMOVE')photoUrl=null;
  else if(pendingPhoto instanceof File){const folder=editType==='outlet'?'outlets':'events';photoUrl=await uploadPhoto(pendingPhoto,folder,tmpId);}

  let error;
  if(editType==='outlet'){const obj={category:editCat,icon,names,descs,photo_url:photoUrl,hours:document.getElementById('f-hours')?.value||'',location:document.getElementById('f-location')?.value||'',phone:document.getElementById('f-phone')?.value||'',dress_code:document.getElementById('f-dress')?.value||'',reservation:document.getElementById('f-reservation')?.value||''};({error}=editItem?await sb.from('outlets').update(obj).eq('id',editItem.id):await sb.from('outlets').insert({...obj,id:tmpId}));}
  else if(editType==='event'){const obj={icon,names,descs,photo_url:photoUrl,event_date:document.getElementById('f-date')?.value,event_time:document.getElementById('f-time')?.value,location:document.getElementById('f-location')?.value||''};({error}=editItem?await sb.from('events').update(obj).eq('id',editItem.id):await sb.from('events').insert({...obj,id:tmpId}));}
  else if(editType==='service'){const obj={icon,names,infos:descs};({error}=editItem?await sb.from('services').update(obj).eq('id',editItem.id):await sb.from('services').insert(obj));}

  btn.disabled=false;btn.textContent='Kaydet';
  if(error){showToast('❌ '+error.message);return;}
  closeModal();await fetchAll();renderA();renderG();showToast('✓ Kaydedildi');
}

async function delItem(type,id){
  if(!confirm('Silmek istediğinizden emin misiniz?'))return;
  let error;
  if(type==='outlet')({error}=await sb.from('outlets').delete().eq('id',id));
  else if(type==='event')({error}=await sb.from('events').delete().eq('id',id));
  else({error}=await sb.from('services').delete().eq('id',id));
  if(error){showToast('❌ '+error.message);return;}
  await fetchAll();renderA();renderG();showToast('🗑️ Silindi');
}

async function editHotelName(){
  const name=prompt('Otel adını girin:',C.hotelName);
  if(!name?.trim())return;
  const{error}=await sb.from('hotel_config').upsert({key:'hotel_name',value:name.trim()});if(!error){C.config.hotel_name=name.trim();}
  if(error){showToast('❌ '+error.message);return;}
  C.hotelName=name.trim();renderG();showToast('✓ Güncellendi');
}

function openAdminLogin(){document.getElementById('login-email').value='';document.getElementById('login-pw').value='';document.getElementById('login-error').textContent='';document.getElementById('login-overlay').classList.add('open');setTimeout(()=>document.getElementById('login-email').focus(),300);}
function closeLogin(){document.getElementById('login-overlay').classList.remove('open');}
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-pw').value;
  const btn=document.getElementById('login-btn');
  if(!email||!pw){document.getElementById('login-error').textContent='E-posta ve şifre gerekli.';return;}
  btn.disabled=true;btn.textContent='Giriş…';
  const{error}=await sb.auth.signInWithPassword({email,password:pw});
  btn.disabled=false;btn.textContent='Giriş';
  if(error){document.getElementById('login-error').textContent='Hatalı e-posta veya şifre!';return;}
  isAdmin=true;closeLogin();document.getElementById('guest-view').style.display='none';document.getElementById('admin-view').style.display='block';atab='restaurants';renderA();
}
async function doLogout(){await sb.auth.signOut();isAdmin=false;document.getElementById('admin-view').style.display='none';document.getElementById('guest-view').style.display='block';renderG();showToast('Çıkış yapıldı');}
function showGuest(){document.getElementById('admin-view').style.display='none';document.getElementById('guest-view').style.display='block';}

function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2500);}

(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  await fetchAll();
  if(session){
    isAdmin=true;
    document.getElementById('guest-view').style.display='none';
    document.getElementById('admin-view').style.display='block';
    atab='dashboard';
    renderA();
  } else {
    renderG();
  }
  setupRT();
})();

sb.auth.onAuthStateChange((event,session)=>{
  if(event==='SIGNED_OUT'){
    isAdmin=false;
    document.getElementById('admin-view').style.display='none';
    document.getElementById('guest-view').style.display='block';
    renderG();
  }
});
</script>
