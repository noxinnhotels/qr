<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Info</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--sand:#f0f6f9;--sand2:#d6e8f0;--palm:#1a5f7a;--palm-light:#2a85a8;--gold:#c4973a;--gold-light:#e8c070;--ocean:#0d3d52;--white:#f8fcfe;--text:#0d2b38;--text-soft:#3d6a7f;--radius:16px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jost',sans-serif;background:var(--sand);color:var(--text);min-height:100vh;}
#guest-view{display:block;}#admin-view{display:none;}
.hero{background:linear-gradient(160deg,#0d3d52 0%,#1a5f7a 45%,#2a9bbf 100%);padding:48px 24px 56px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");}
.hero-leaves{position:absolute;font-size:80px;opacity:.08;pointer-events:none;}
.hero-leaves.l1{top:-10px;left:-20px;transform:rotate(-30deg);}
.hero-leaves.l2{top:20px;right:-10px;transform:rotate(20deg);}
.hero-leaves.l3{bottom:-20px;left:40%;transform:rotate(10deg);}
.hotel-label{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:300;letter-spacing:4px;text-transform:uppercase;color:var(--gold-light);margin-bottom:8px;}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:300;color:var(--white);line-height:1.1;margin-bottom:8px;}
.hero-sub{font-size:13px;color:rgba(255,255,255,.55);letter-spacing:1px;font-weight:300;}
.announcement-banner{display:none;padding:12px 16px;gap:10px;align-items:flex-start;}
.announcement-banner.show{display:flex;}
.announcement-banner.info{background:#e3f4fb;border-bottom:2px solid #7ec8e3;}
.announcement-banner.warning{background:#fff8e1;border-bottom:2px solid #ffe082;}
.announcement-banner.urgent{background:#ffebee;border-bottom:2px solid #ef9a9a;}
.announcement-banner.success{background:#f1f8e9;border-bottom:2px solid #aed581;}
.ann-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.ann-text{font-size:13px;line-height:1.5;flex:1;color:var(--text);}
.ann-close{background:none;border:none;font-size:18px;color:var(--text-soft);cursor:pointer;padding:0 4px;flex-shrink:0;}
.lang-bar{background:var(--white);padding:10px 20px;display:flex;gap:4px;overflow-x:auto;border-bottom:1px solid var(--sand2);scrollbar-width:none;}
.lang-bar::-webkit-scrollbar{display:none;}
.lang-btn{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1.5px solid transparent;background:none;font-family:'Jost',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:var(--text-soft);transition:all .2s;}
.lang-btn.active{background:var(--palm);color:white;border-color:var(--palm);}
.nav-tabs{background:var(--white);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{flex-shrink:0;padding:13px 14px;border:none;background:none;font-family:'Jost',sans-serif;font-size:12px;font-weight:400;color:var(--text-soft);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.nav-tab.active{color:var(--palm);border-bottom-color:var(--palm);font-weight:500;}
.content-area{padding:16px 16px 80px;max-width:620px;margin:0 auto;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:var(--text);margin-bottom:4px;}
.section-sub{font-size:12px;color:var(--text-soft);margin-bottom:20px;letter-spacing:.5px;}
.card{background:var(--white);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);border:1px solid rgba(196,151,58,.12);transition:box-shadow .2s;}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.09);}
.card-photo{width:100%;height:160px;object-fit:cover;display:block;cursor:pointer;}
.card-header{padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;}
.card-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.icon-restaurant{background:linear-gradient(135deg,#fde8c8,#f5c87a);}
.icon-bar{background:linear-gradient(135deg,#c8e0fd,#7ab2f5);}
.icon-pool{background:linear-gradient(135deg,#c8f0fd,#7ad4f5);}
.icon-spa{background:linear-gradient(135deg,#e8c8fd,#c87af5);}
.card-info{flex:1;min-width:0;}
.card-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-hours{font-size:12px;color:var(--text-soft);margin-top:2px;display:flex;align-items:center;gap:5px;}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.status-dot.open{background:#4caf7d;}.status-dot.closed{background:#e57373;}
.card-arrow{color:var(--text-soft);font-size:18px;transition:transform .2s;flex-shrink:0;}
.card.expanded .card-arrow{transform:rotate(90deg);}
.card-body{display:none;padding:0 18px 16px;border-top:1px solid var(--sand2);}
.card.expanded .card-body{display:block;}
.card-desc{font-size:13.5px;color:var(--text-soft);line-height:1.65;margin:12px 0;}
.detail-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--sand2);font-size:13px;}
.detail-row:last-child{border-bottom:none;}
.detail-label{font-weight:500;color:var(--palm);min-width:90px;flex-shrink:0;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding-top:1px;}
.detail-val{color:var(--text);flex:1;}
.event-card{background:var(--white);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;border:1px solid rgba(196,151,58,.12);box-shadow:0 2px 8px rgba(0,0,0,.05);}
.event-photo{width:100%;height:140px;object-fit:cover;display:block;cursor:pointer;}
.event-date-strip{background:linear-gradient(90deg,var(--ocean),var(--palm));padding:10px 16px;display:flex;align-items:center;gap:12px;}
.event-date-box{text-align:center;background:rgba(255,255,255,.15);border-radius:8px;padding:6px 10px;min-width:44px;}
.event-day{font-size:20px;font-weight:500;color:white;line-height:1;}
.event-month{font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,.8);text-transform:uppercase;}
.event-title-wrap{flex:1;}
.event-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:white;line-height:1.2;}
.event-time{font-size:12px;color:rgba(255,255,255,.75);margin-top:2px;}
.event-body{padding:12px 16px;}
.event-desc{font-size:13px;color:var(--text-soft);line-height:1.6;}
.event-location{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:12px;color:var(--palm);background:rgba(26,95,122,.08);padding:4px 10px;border-radius:20px;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-month-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;}
.cal-nav{background:none;border:1.5px solid var(--sand2);border-radius:8px;padding:4px 12px;font-size:16px;cursor:pointer;color:var(--text-soft);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:16px;}
.cal-dow{text-align:center;font-size:10px;font-weight:500;color:var(--text-soft);padding:6px 0;text-transform:uppercase;}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;font-size:13px;position:relative;gap:2px;}
.cal-day.other-month{color:var(--text-soft);opacity:.3;}
.cal-day.today{background:var(--palm);color:white;font-weight:600;}
.cal-day.has-event{font-weight:600;cursor:pointer;}
.cal-day.has-event:not(.today){background:rgba(26,95,122,.1);color:var(--palm);}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);}
.cal-day.today .cal-dot{background:var(--gold-light);}
.cal-event-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--white);border-radius:10px;margin-bottom:6px;border:1px solid var(--sand2);}
.service-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.service-item{background:var(--white);border-radius:var(--radius);padding:16px;border:1px solid rgba(196,151,58,.12);}
.service-item .s-icon{font-size:24px;margin-bottom:8px;}
.service-item .s-name{font-size:13px;font-weight:500;margin-bottom:4px;}
.service-item .s-info{font-size:12px;color:var(--text-soft);line-height:1.5;white-space:pre-line;}
.gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.gallery-item{border-radius:12px;overflow:hidden;position:relative;aspect-ratio:4/3;cursor:pointer;}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.gallery-item:hover img{transform:scale(1.05);}
.gallery-caption{position:absolute;bottom:0;left:0;right:0;padding:8px 10px;background:linear-gradient(transparent,rgba(0,0,0,.6));color:white;font-size:12px;font-family:'Cormorant Garamond',serif;}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:400;align-items:center;justify-content:center;}
.lightbox.open{display:flex;}
.lightbox img{max-width:94vw;max-height:88vh;object-fit:contain;border-radius:8px;}
.lb-close{position:absolute;top:16px;right:20px;background:none;border:none;color:white;font-size:28px;cursor:pointer;}
.request-form{background:var(--white);border-radius:var(--radius);padding:20px;border:1px solid rgba(196,151,58,.12);}
.request-form h3{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;margin-bottom:6px;}
.request-form p{font-size:13px;color:var(--text-soft);margin-bottom:16px;line-height:1.55;}
.request-success{text-align:center;padding:24px;}
.request-success .rs-icon{font-size:40px;margin-bottom:10px;}
.fi{width:100%;padding:11px 14px;border:1.5px solid var(--sand2);border-radius:10px;font-family:'Jost',sans-serif;font-size:14px;color:var(--text);background:white;outline:none;margin-bottom:10px;transition:border-color .2s;}
.fi:focus{border-color:var(--palm);}
textarea.fi{resize:vertical;min-height:100px;margin-bottom:10px;}
.btn-submit{width:100%;padding:13px;background:var(--palm);color:white;border:none;border-radius:10px;font-family:'Jost',sans-serif;font-size:14px;font-weight:500;cursor:pointer;}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;}
.loading-state{text-align:center;padding:48px 24px;color:var(--text-soft);}
.loading-spinner{width:36px;height:36px;border:3px solid var(--sand2);border-top-color:var(--palm);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-state{text-align:center;padding:48px 24px;color:var(--text-soft);}
.empty-state .e-icon{font-size:40px;margin-bottom:12px;opacity:.5;}
.admin-fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--gold);color:white;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(196,151,58,.4);z-index:100;transition:transform .2s;}
.admin-fab:hover{transform:scale(1.1);}
.admin-header{background:linear-gradient(135deg,var(--ocean),var(--palm));padding:14px 14px 10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.admin-header h2{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:white;flex:1;}
.btn-back{background:rgba(255,255,255,.15);border:none;color:white;padding:7px 12px;border-radius:20px;font-family:'Jost',sans-serif;font-size:12px;cursor:pointer;}
.btn-logout{background:rgba(229,115,115,.25);border:none;color:#ffcdd2;padding:7px 12px;border-radius:20px;font-family:'Jost',sans-serif;font-size:12px;cursor:pointer;}
.hotel-name-edit{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;border-radius:8px;padding:4px 10px;font-family:'Jost',sans-serif;font-size:12px;cursor:pointer;}
.admin-tabs{background:white;display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--sand2);position:sticky;top:0;z-index:10;}
.admin-tabs::-webkit-scrollbar{display:none;}
.admin-tab{flex-shrink:0;padding:11px 12px;border:none;background:none;font-family:'Jost',sans-serif;font-size:12px;color:var(--text-soft);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap;}
.admin-tab.active{color:var(--palm);border-bottom-color:var(--palm);font-weight:500;}
.admin-content{padding:14px;max-width:720px;margin:0 auto;}
.ali{background:white;border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--sand2);display:flex;align-items:center;gap:10px;}
.ali-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.ali-ph{width:44px;height:44px;border-radius:8px;background:var(--sand2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ali-info{flex:1;min-width:0;}
.ali-name{font-size:14px;font-weight:500;color:var(--text);}
.ali-sub{font-size:11px;color:var(--text-soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ali-act{display:flex;gap:5px;}
.be,.bd{border:none;border-radius:8px;padding:6px 10px;font-family:'Jost',sans-serif;font-size:12px;cursor:pointer;}
.be{background:rgba(26,95,122,.1);color:var(--palm);}
.bd{background:rgba(229,115,115,.12);color:#c0392b;}
.btn-add{width:100%;padding:12px;background:var(--palm);color:white;border:none;border-radius:12px;font-family:'Jost',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-add:hover{opacity:.88;}
.req-item{background:white;border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--sand2);border-left:4px solid transparent;}
.req-item.unread{border-left-color:var(--gold);}
.req-item.resolved{border-left-color:#4caf7d;opacity:.75;}
.req-top{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap;}
.req-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;text-transform:uppercase;}
.req-badge.unread{background:#fff8e1;color:#f57f17;}
.req-badge.read{background:var(--sand2);color:var(--text-soft);}
.req-badge.resolved{background:#e8f5e9;color:#2e7d32;}
.req-time{font-size:11px;color:var(--text-soft);margin-left:auto;}
.req-msg{font-size:13.5px;line-height:1.55;}
.req-act{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.brq{border:none;border-radius:8px;padding:6px 12px;font-family:'Jost',sans-serif;font-size:11px;cursor:pointer;font-weight:500;}
.unread-badge{background:var(--gold);color:white;border-radius:10px;font-size:10px;font-weight:700;padding:1px 6px;margin-left:4px;}
.ann-type-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.ann-type-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--sand2);background:none;font-family:'Jost',sans-serif;font-size:12px;cursor:pointer;}
.ann-type-btn.sel{background:var(--palm);color:white;border-color:var(--palm);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;padding:24px 20px 40px;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;margin-bottom:20px;}
.fg{margin-bottom:12px;}
.fl{display:block;font-size:11px;font-weight:500;color:var(--text-soft);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.fi2{width:100%;padding:10px 14px;border:1.5px solid var(--sand2);border-radius:10px;font-family:'Jost',sans-serif;font-size:14px;color:var(--text);background:white;outline:none;transition:border-color .2s;}
.fi2:focus{border-color:var(--palm);}
textarea.fi2{resize:vertical;min-height:70px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.lst{font-size:12px;font-weight:500;color:var(--palm);margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--sand2);}
.ltag{background:var(--sand2);padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;margin-right:4px;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.btn-save{flex:1;padding:13px;background:var(--palm);color:white;border:none;border-radius:10px;font-family:'Jost',sans-serif;font-size:14px;font-weight:500;cursor:pointer;}
.btn-save:disabled{opacity:.5;cursor:not-allowed;}
.btn-cancel{padding:13px 20px;background:var(--sand2);color:var(--text);border:none;border-radius:10px;font-family:'Jost',sans-serif;font-size:14px;cursor:pointer;}
.icon-picker{display:flex;flex-wrap:wrap;gap:5px;}
.icon-btn{font-size:20px;padding:5px;border:2px solid transparent;border-radius:8px;background:none;cursor:pointer;line-height:1;}
.icon-btn.sel{border-color:var(--palm);background:rgba(26,95,122,.1);}
.photo-prev{width:100%;height:130px;object-fit:cover;border-radius:10px;margin-bottom:8px;display:none;}
.photo-prev.show{display:block;}
.upload-btn{width:100%;padding:10px;border:2px dashed var(--sand2);border-radius:10px;background:none;font-family:'Jost',sans-serif;font-size:13px;color:var(--text-soft);cursor:pointer;text-align:center;}
.upload-btn:hover{border-color:var(--palm);color:var(--palm);}
.login-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:center;justify-content:center;padding:20px;}
.login-overlay.open{display:flex;}
.login-box{background:var(--white);border-radius:20px;padding:32px 28px;width:100%;max-width:360px;text-align:center;}
.login-error{font-size:13px;color:#c0392b;margin-top:8px;min-height:20px;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#2c2416;color:white;padding:10px 22px;border-radius:24px;font-size:13px;z-index:500;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--sand2);border-radius:4px;}
</style>
</head>
<body>
<div id="guest-view">
  <div class="hero">
    <div class="hero-leaves l1">🌴</div><div class="hero-leaves l2">🌿</div><div class="hero-leaves l3">🍃</div>
    <div class="hotel-label">HOTEL</div>
    <h1 id="hnd">Noxinn Deluxe Hotel</h1>
    <div class="hero-sub" id="hsub">Your tropical escape awaits</div>
  </div>
  <div class="announcement-banner" id="ann-banner">
    <div class="ann-icon" id="ann-icon">ℹ️</div>
    <div class="ann-text" id="ann-text"></div>
    <button class="ann-close" onclick="document.getElementById('ann-banner').classList.remove('show')">×</button>
  </div>
  <div class="lang-bar" id="lang-bar"></div>
  <div class="nav-tabs" id="nav-tabs"></div>
  <div class="content-area" id="content-area"><div class="loading-state"><div class="loading-spinner"></div><p>Yükleniyor…</p></div></div>
  <button class="admin-fab" onclick="openAdminLogin()">⚙️</button>
</div>

<div id="admin-view">
  <div class="admin-header">
    <button class="btn-back" onclick="showGuest()">← Misafir</button>
    <h2>Yönetim Paneli</h2>
    <button class="hotel-name-edit" onclick="editHotelName()">✏️ Ad</button>
    <button class="btn-logout" onclick="doLogout()">Çıkış</button>
  </div>
  <div class="admin-tabs" id="admin-tabs"></div>
  <div class="admin-content" id="admin-content"></div>
</div>

<div class="login-overlay" id="login-overlay">
  <div class="login-box">

function renderCal(ca){
  const mn=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  const fd=new Date(calY,calM,1).getDay();
  const dim=new Date(calY,calM+1,0).getDate();
  const today=new Date();
  const ed={};
  C.events.forEach(ev=>{const d=new Date(ev.event_date+'T12:00:00');if(d.getFullYear()===calY&&d.getMonth()===calM){const k=d.getDate();if(!ed[k])ed[k]=[];ed[k].push(ev);}});
  const off=(fd+6)%7;
  let days='';
  ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'].forEach(d=>{days+=`<div class="cal-dow">${d}</div>`;});
  for(let i=0;i<off;i++)days+=`<div class="cal-day other-month"></div>`;
  for(let d=1;d<=dim;d++){
    const it=d===today.getDate()&&calM===today.getMonth()&&calY===today.getFullYear();
    const he=ed[d];
    days+=`<div class="cal-day ${it?'today':''} ${he?'has-event':''}" ${he?`onclick="document.getElementById('ce${d}')?.scrollIntoView({behavior:'smooth',block:'center'})"`:''}>${d}${he?`<div class="cal-dot"></div>`:''}</div>`;
  }
  const w=document.createElement('div');
  w.innerHTML=`<div class="cal-header"><button class="cal-nav" onclick="calNav(-1)">‹</button><div class="cal-month-title">${mn[calM]} ${calY}</div><button class="cal-nav" onclick="calNav(1)">›</button></div><div class="cal-grid">${days}</div><div id="cal-list"></div>`;
  ca.appendChild(w);
  const cl=w.querySelector('#cal-list');
  const evs=C.events.filter(ev=>{const d=new Date(ev.event_date+'T12:00:00');return d.getFullYear()===calY&&d.getMonth()===calM;});
  if(!evs.length){cl.innerHTML=`<div style="text-align:center;color:var(--text-soft);padding:16px;font-size:13px">Bu ay etkinlik yok</div>`;return;}
  evs.forEach(ev=>{const d=new Date(ev.event_date+'T12:00:00');const r=document.createElement('div');r.className='cal-event-row';r.id=`ce${d.getDate()}`;r.innerHTML=`<div style="font-size:20px">${ev.icon}</div><div style="flex:1;font-size:14px;font-weight:500">${gn(ev)}</div><div style="font-size:12px;color:var(--text-soft)">${(ev.event_time||'').slice(0,5)}</div>`;cl.appendChild(r);});
}

function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}

function renderA(){
  const unread=C.requests.filter(r=>r.status==='unread').length;
  document.getElementById('admin-tabs').innerHTML=ADMIN_TABS.map(c=>`<button class="admin-tab ${c.id===atab?'active':''}" onclick="setAtab('${c.id}')">${c.icon} ${c.label}${c.id==='requests'&&unread>0?`<span class="unread-badge">${unread}</span>`:''}</button>`).join('');
  const ac=document.getElementById('admin-content');ac.innerHTML='';
  const addBtn=(lbl,fn)=>{const b=document.createElement('button');b.className='btn-add';b.innerHTML=`<span>+</span> ${lbl}`;b.onclick=fn;ac.appendChild(b);};
  const noItem=()=>{ac.innerHTML+=`<div style="text-align:center;color:#aaa;padding:32px;font-size:14px">Henüz öğe yok</div>`;};

  if(atab==='restaurants'||atab==='pools'){
    addBtn(atab==='restaurants'?'Restoran / Bar Ekle':'Havuz / Spa Ekle',()=>openModal('outlet',atab,null));
    const items=C.outlets.filter(i=>i.category===atab);
    if(!items.length)noItem();
    items.forEach(item=>{
      const el=document.createElement('div');el.className='ali';
      el.innerHTML=`${item.photo_url?`<img class="ali-thumb" src="${item.photo_url}" alt="">`:`<div class="ali-ph">${item.icon}</div>`}<div class="ali-info"><div class="ali-name">${item.names?.tr||item.names?.en||'—'}</div><div class="ali-sub">${item.hours||'—'} · ${item.location||'—'}</div></div><div class="ali-act"><button class="be" onclick="openModal('outlet','${atab}','${item.id}')">✏️</button><button class="bd" onclick="delItem('outlet','${item.id}')">🗑️</button></div>`;
      ac.appendChild(el);
    });
  }
  else if(atab==='events'){
    addBtn('Etkinlik Ekle',()=>openModal('event','events',null));
    if(!C.events.length)noItem();
    C.events.forEach(ev=>{
      const el=document.createElement('div');el.className='ali';
      el.innerHTML=`${ev.photo_url?`<img class="ali-thumb" src="${ev.photo_url}" alt="">`:`<div class="ali-ph">${ev.icon}</div>`}<div class="ali-info"><div class="ali-name">${ev.names?.tr||ev.names?.en||'—'}</div><div class="ali-sub">${ev.event_date} ${(ev.event_time||'').slice(0,5)} · ${ev.location||'—'}</div></div><div class="ali-act"><button class="be" onclick="openModal('event','events','${ev.id}')">✏️</button><button class="bd" onclick="delItem('event','${ev.id}')">🗑️</button></div>`;
      ac.appendChild(el);
    });
  }
  else if(atab==='services'){
    addBtn('Hizmet Ekle',()=>openModal('service','services',null));
    if(!C.services.length)noItem();
    C.services.forEach(svc=>{
      const el=document.createElement('div');el.className='ali';
      el.innerHTML=`<div class="ali-ph">${svc.icon}</div><div class="ali-info"><div class="ali-name">${svc.names?.tr||svc.names?.en||'—'}</div><div class="ali-sub">${(svc.infos?.tr||svc.infos?.en||'—').replace(/\n/g,' ')}</div></div><div class="ali-act"><button class="be" onclick="openModal('service','services','${svc.id}')">✏️</button><button class="bd" onclick="delItem('service','${svc.id}')">🗑️</button></div>`;
      ac.appendChild(el);
    });
  }
  else if(atab==='requests') renderReqAdmin(ac);
  else if(atab==='announcements') renderAnnAdmin(ac);
}

function renderReqAdmin(ac){
  const filters=['all','unread','read','resolved'];
  const labels={all:'Tümü',unread:'Okunmadı',read:'Okundu',resolved:'Çözüldü'};
  const fbar=document.createElement('div');fbar.style.cssText='display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;';
  filters.forEach(f=>{
    const cnt=f==='all'?C.requests.length:C.requests.filter(r=>r.status===f).length;
    const b=document.createElement('button');
    b.style.cssText=`padding:6px 14px;border-radius:20px;border:1.5px solid var(--sand2);background:${reqFilter===f?'var(--palm)':'none'};color:${reqFilter===f?'white':'var(--text-soft)'};font-family:Jost,sans-serif;font-size:12px;cursor:pointer;`;
    b.textContent=`${labels[f]} (${cnt})`;b.onclick=()=>{reqFilter=f;renderA();};fbar.appendChild(b);
  });
  ac.appendChild(fbar);
  const reqs=C.requests.filter(r=>reqFilter==='all'||r.status===reqFilter);
  if(!reqs.length){ac.innerHTML+=`<div style="text-align:center;color:#aaa;padding:32px;font-size:14px">Talep yok</div>`;return;}
  reqs.forEach(req=>{
    const el=document.createElement('div');el.className=`req-item ${req.status}`;
    const d=new Date(req.created_at);
    const ts=d.toLocaleDateString('tr-TR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    const bl={unread:'Okunmadı',read:'Okundu',resolved:'Çözüldü'};
    el.innerHTML=`<div class="req-top"><span class="req-badge ${req.status}">${bl[req.status]}</span>${req.room_number?`<span style="font-size:12px;color:var(--text-soft)">🚪 ${req.room_number}</span>`:''}<span style="font-size:11px;color:var(--text-soft)">🌐 ${(req.lang||'?').toUpperCase()}</span><span class="req-time">${ts}</span></div><div class="req-msg">${req.message}</div><div class="req-act">${req.status==='unread'?`<button class="brq" style="background:rgba(26,95,122,.1);color:var(--palm)" onclick="updReq('${req.id}','read')">✓ Okundu</button>`:''}${req.status!=='resolved'?`<button class="brq" style="background:#e8f5e9;color:#2e7d32" onclick="updReq('${req.id}','resolved')">✅ Çözüldü</button>`:''}${ `<button class="brq" style="background:rgba(229,115,115,.12);color:#c0392b" onclick="delReq('${req.id}')">🗑️</button>`}</div>`;
    ac.appendChild(el);
  });
}

async function updReq(id,status){await sb.from('guest_requests').update({status}).eq('id',id);await fetchAll();renderA();}
async function delReq(id){if(!confirm('Talebi sil?'))return;await sb.from('guest_requests').delete().eq('id',id);await fetchAll();renderA();}

function renderAnnAdmin(ac){
  sb.from('announcements').select('*').order('created_at',{ascending:false}).then(({data})=>{
    ac.innerHTML='';
    const b=document.createElement('button');b.className='btn-add';b.innerHTML='<span>+</span> Yeni Duyuru';b.onclick=()=>openAnnModal(null);ac.appendChild(b);
    if(!data||!data.length){ac.innerHTML+=`<div style="text-align:center;color:#aaa;padding:32px;font-size:14px">Duyuru yok</div>`;return;}
    data.forEach(ann=>{
      const el=document.createElement('div');el.className='ali';
      const msg=(ann.messages?.tr||ann.messages?.en||'').slice(0,50);
      el.innerHTML=`<div class="ali-ph">${ANN_ICONS[ann.type]||'📢'}</div><div class="ali-info"><div class="ali-name" style="display:flex;align-items:center;gap:6px">${msg}<span style="font-size:10px;padding:2px 7px;border-radius:10px;background:${ann.is_active?'#e8f5e9':'var(--sand2)'};color:${ann.is_active?'#2e7d32':'var(--text-soft)'}">${ann.is_active?'Aktif':'Pasif'}</span></div><div class="ali-sub">${ann.type?.toUpperCase()} · ${new Date(ann.created_at).toLocaleDateString('tr-TR')}</div></div><div class="ali-act"><button class="be" onclick="toggleAnn('${ann.id}',${ann.is_active})">${ann.is_active?'⏸':'▶️'}</button><button class="be" onclick="openAnnModal('${ann.id}')">✏️</button><button class="bd" onclick="delAnn('${ann.id}')">🗑️</button></div>`;
      ac.appendChild(el);
    });
  });
}

async function toggleAnn(id,cur){await sb.from('announcements').update({is_active:!cur}).eq('id',id);await fetchAll();renderA();renderAnn();showToast(cur?'Durduruldu':'Yayınlandı');}
async function delAnn(id){if(!confirm('Duyuruyu sil?'))return;await sb.from('announcements').delete().eq('id',id);await fetchAll();renderA();renderAnn();}

function openAnnModal(id){
  editType='announcement';
  if(id){sb.from('announcements').select('*').eq('id',id).single().then(({data})=>{editAnn=data;showAnnModal(data);});}
  else{editAnn=null;showAnnModal(null);}
}
function showAnnModal(ann){
  document.getElementById('modal-title').textContent=ann?'Duyuru Düzenle':'Yeni Duyuru';
  let html=`<div class="fg"><div class="fl">Tür</div><div class="ann-type-row">${ANN_TYPES.map(at=>`<button type="button" class="ann-type-btn ${(ann?.type||'info')===at.id?'sel':''}" onclick="selAnnType('${at.id}',this)">${at.label}</button>`).join('')}</div><input type="hidden" id="f-ann-type" value="${ann?.type||'info'}"></div><div class="lst">🌍 Mesaj (dil başına)</div>`;
  LANGS.forEach(l=>{html+=`<div class="fg" style="margin-bottom:8px"><div class="fl"><span class="ltag">${l.label}</span>${l.name}</div><input class="fi2" id="fann-${l.code}" value="${ann?.messages?.[l.code]||''}" placeholder="${l.name}..."></div>`;});
  document.getElementById('modal-form-body').innerHTML=html;
  document.getElementById('item-modal').classList.add('open');
}
function selAnnType(type,btn){document.getElementById('f-ann-type').value=type;document.querySelectorAll('.ann-type-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}

function setAtab(id){atab=id;renderA();}

function openModal(type,cat,id){
  editType=type;editCat=cat;pendingPhoto=null;
  let ex=null;
  if(id){if(type==='outlet')ex=C.outlets.find(i=>i.id===id);else if(type==='event')ex=C.events.find(i=>i.id===id);else ex=C.services.find(i=>i.id===id);}
  editItem=ex||null;
  const iv=ex?.icon||(type==='outlet'?'🍽️':type==='event'?'🎉':'🛎️');
  document.getElementById('modal-title').textContent=ex?(type==='outlet'?'Outlet Düzenle':type==='event'?'Etkinlik Düzenle':'Hizmet Düzenle'):(type==='outlet'?'Outlet Ekle':type==='event'?'Etkinlik Ekle':'Hizmet Ekle');

  let html=`<div class="fg"><div class="fl">İkon</div><div class="icon-picker">${ICONS.map(ic=>`<button type="button" class="icon-btn${ic===iv?' sel':''}" onclick="pickIcon('${ic}',this)">${ic}</button>`).join('')}</div><input type="hidden" id="f-icon" value="${iv}"></div>`;

  if(type!=='service'){
    html+=`<div class="fg"><div class="fl">📸 Fotoğraf</div>${ex?.photo_url?`<img class="photo-prev show" id="photo-prev" src="${ex.photo_url}">`:`<img class="photo-prev" id="photo-prev" src="">`}<button type="button" class="upload-btn" onclick="document.getElementById('pf').click()">📁 Fotoğraf Seç</button><input type="file" id="pf" accept="image/*" style="display:none" onchange="handlePhoto(this)">${ex?.photo_url?`<button type="button" style="width:100%;margin-top:6px;padding:8px;border:none;background:none;color:#c0392b;font-family:Jost,sans-serif;font-size:12px;cursor:pointer" onclick="removePhoto()">🗑️ Fotoğrafı Kaldır</button>`:''}</div>`;
  }
  if(type==='outlet'){
    html+=`<div class="fr"><div class="fg"><div class="fl">Çalışma Saatleri</div><input class="fi2" id="f-hours" value="${ex?.hours||''}" placeholder="09:00 – 22:00"></div><div class="fg"><div class="fl">Dahili / Tel</div><input class="fi2" id="f-phone" value="${ex?.phone||''}" placeholder="1001"></div></div><div class="fr"><div class="fg"><div class="fl">Konum</div><input class="fi2" id="f-location" value="${ex?.location||''}" placeholder="Ground Floor"></div><div class="fg"><div class="fl">Kıyafet Kodu</div><input class="fi2" id="f-dress" value="${ex?.dress_code||''}" placeholder="Smart casual"></div></div><div class="fg"><div class="fl">Rezervasyon</div><input class="fi2" id="f-reservation" value="${ex?.reservation||''}" placeholder="Zorunlu"></div>`;
  }else if(type==='event'){
    html+=`<div class="fr"><div class="fg"><div class="fl">Tarih</div><input type="date" class="fi2" id="f-date" value="${ex?.event_date||new Date().toISOString().split('T')[0]}"></div><div class="fg"><div class="fl">Saat</div><input type="time" class="fi2" id="f-time" value="${(ex?.event_time||'20:00').slice(0,5)}"></div></div><div class="fg"><div class="fl">Konum</div><input class="fi2" id="f-location" value="${ex?.location||''}" placeholder="Beach Stage"></div>`;
  }
  const dk=type==='service'?'infos':'descs';
  html+=`<div class="lst">🌍 İsimler</div>`;
  LANGS.forEach(l=>{html+=`<div class="fg" style="margin-bottom:8px"><div class="fl"><span class="ltag">${l.label}</span>${l.name}</div><input class="fi2" id="fn-${l.code}" value="${ex?.names?.[l.code]||''}" placeholder="${l.name}..."></div>`;});
  html+=`<div class="lst">🌍 ${type==='service'?'Bilgi':'Açıklama'}</div>`;
  LANGS.forEach(l=>{html+=`<div class="fg" style="margin-bottom:8px"><div class="fl"><span class="ltag">${l.label}</span>${l.name}</div><textarea class="fi2" id="fd-${l.code}" rows="2" placeholder="${l.name}...">${ex?.[dk]?.[l.code]||''}</textarea></div>`;});

  document.getElementById('modal-form-body').innerHTML=html;
  document.getElementById('item-modal').classList.add('open');
}

function pickIcon(ic,btn){document.getElementById('f-icon').value=ic;document.querySelectorAll('.icon-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}
function handlePhoto(inp){const f=inp.files[0];if(!f)return;pendingPhoto=f;const r=new FileReader();r.onload=e=>{const p=document.getElementById('photo-prev');if(p){p.src=e.target.result;p.classList.add('show');}};r.readAsDataURL(f);}
function removePhoto(){pendingPhoto='REMOVE';const p=document.getElementById('photo-prev');if(p){p.src='';p.classList.remove('show');}}

async function uploadPhoto(file,folder,id){
  const ext=file.name.split('.').pop();
  const path=`${folder}/${id}.${ext}`;
  const{error}=await sb.storage.from(BUCKET).upload(path,file,{upsert:true,contentType:file.type});
  if(error){console.error(error);return null;}
  return sb.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;
}

function closeModal(){document.getElementById('item-modal').classList.remove('open');editItem=null;editType=null;editCat=null;editAnn=null;pendingPhoto=null;}

async function saveItem(){
  if(editType==='announcement'){
    const type=document.getElementById('f-ann-type').value;
    const messages={};LANGS.forEach(l=>{messages[l.code]=document.getElementById(`fann-${l.code}`)?.value||'';});
    if(!messages.tr&&!messages.en){showToast('⚠️ En az bir dilde mesaj girin!');return;}
    const btn=document.getElementById('save-btn');btn.disabled=true;btn.textContent='Kaydediliyor…';
    const{error}=editAnn?await sb.from('announcements').update({type,messages,updated_at:new Date().toISOString()}).eq('id',editAnn.id):await sb.from('announcements').insert({type,messages,is_active:true});
    btn.disabled=false;btn.textContent='Kaydet';
    if(error){showToast('❌ '+error.message);return;}
    closeModal();await fetchAll();renderA();renderAnn();showToast('✓ Duyuru kaydedildi');return;
  }

  const btn=document.getElementById('save-btn');btn.disabled=true;btn.textContent='Kaydediliyor…';
  const icon=document.getElementById('f-icon').value;
  const names={},descs={};
  LANGS.forEach(l=>{names[l.code]=document.getElementById(`fn-${l.code}`)?.value||'';descs[l.code]=document.getElementById(`fd-${l.code}`)?.value||'';});
  if(!names.tr&&!names.en){showToast('⚠️ TR veya EN isim girin!');btn.disabled=false;btn.textContent='Kaydet';return;}

  let photoUrl=editItem?.photo_url||null;
  const tmpId=editItem?.id||crypto.randomUUID();
  if(pendingPhoto==='REMOVE')photoUrl=null;
  else if(pendingPhoto instanceof File){const folder=editType==='outlet'?'outlets':'events';photoUrl=await uploadPhoto(pendingPhoto,folder,tmpId);}

  let error;
  if(editType==='outlet'){const obj={category:editCat,icon,names,descs,photo_url:photoUrl,hours:document.getElementById('f-hours')?.value||'',location:document.getElementById('f-location')?.value||'',phone:document.getElementById('f-phone')?.value||'',dress_code:document.getElementById('f-dress')?.value||'',reservation:document.getElementById('f-reservation')?.value||''};({error}=editItem?await sb.from('outlets').update(obj).eq('id',editItem.id):await sb.from('outlets').insert({...obj,id:tmpId}));}
  else if(editType==='event'){const obj={icon,names,descs,photo_url:photoUrl,event_date:document.getElementById('f-date')?.value,event_time:document.getElementById('f-time')?.value,location:document.getElementById('f-location')?.value||''};({error}=editItem?await sb.from('events').update(obj).eq('id',editItem.id):await sb.from('events').insert({...obj,id:tmpId}));}
  else if(editType==='service'){const obj={icon,names,infos:descs};({error}=editItem?await sb.from('services').update(obj).eq('id',editItem.id):await sb.from('services').insert(obj));}

  btn.disabled=false;btn.textContent='Kaydet';
  if(error){showToast('❌ '+error.message);return;}
  closeModal();await fetchAll();renderA();renderG();showToast('✓ Kaydedildi');
}

async function delItem(type,id){
  if(!confirm('Silmek istediğinizden emin misiniz?'))return;
  let error;
  if(type==='outlet')({error}=await sb.from('outlets').delete().eq('id',id));
  else if(type==='event')({error}=await sb.from('events').delete().eq('id',id));
  else({error}=await sb.from('services').delete().eq('id',id));
  if(error){showToast('❌ '+error.message);return;}
  await fetchAll();renderA();renderG();showToast('🗑️ Silindi');
}

async function editHotelName(){
  const name=prompt('Otel adını girin:',C.hotelName);
  if(!name?.trim())return;
  const{error}=await sb.from('hotel_config').upsert({key:'hotel_name',value:name.trim()});
  if(error){showToast('❌ '+error.message);return;}
  C.hotelName=name.trim();renderG();showToast('✓ Güncellendi');
}

function openAdminLogin(){document.getElementById('login-email').value='';document.getElementById('login-pw').value='';document.getElementById('login-error').textContent='';document.getElementById('login-overlay').classList.add('open');setTimeout(()=>document.getElementById('login-email').focus(),300);}
function closeLogin(){document.getElementById('login-overlay').classList.remove('open');}
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-pw').value;
  const btn=document.getElementById('login-btn');
  if(!email||!pw){document.getElementById('login-error').textContent='E-posta ve şifre gerekli.';return;}
  btn.disabled=true;btn.textContent='Giriş…';
  const{error}=await sb.auth.signInWithPassword({email,password:pw});
  btn.disabled=false;btn.textContent='Giriş';
  if(error){document.getElementById('login-error').textContent='Hatalı e-posta veya şifre!';return;}
  isAdmin=true;closeLogin();document.getElementById('guest-view').style.display='none';document.getElementById('admin-view').style.display='block';atab='restaurants';renderA();
}
async function doLogout(){await sb.auth.signOut();isAdmin=false;document.getElementById('admin-view').style.display='none';document.getElementById('guest-view').style.display='block';renderG();showToast('Çıkış yapıldı');}
function showGuest(){document.getElementById('admin-view').style.display='none';document.getElementById('guest-view').style.display='block';}

function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2500);}

(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session)isAdmin=true;
  await fetchAll();
  renderG();
  setupRT();
})();
</script>
