<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hotel Info</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hotel Info">
<meta name="theme-color" content="#0d3d52" id="theme-meta">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

/* ════════════════════════════════════════
   NOXINN DELUXE — GUEST UI v3
   Luxury Resort Design System
════════════════════════════════════════ */

:root {
  /* Palette */
  --ocean:   #0a2d42;
  --deep:    #061a28;
  --teal:    #1a6b8a;
  --teal-lt: #2a9bbf;
  --gold:    #c9a84c;
  --gold-lt: #e0c070;
  --sand:    #f6f9fb;
  --sand2:   #e4eef4;
  --white:   #ffffff;
  --text:    #0c2230;
  --text-md: #3a6070;
  --text-lt: #7a9fb0;
  --green:   #3cb87a;
  --red:     #e05555;

  /* Elevation */
  --s1: 0 1px 3px rgba(10,45,66,.06), 0 2px 8px rgba(10,45,66,.08);
  --s2: 0 2px 8px rgba(10,45,66,.06), 0 6px 24px rgba(10,45,66,.10);
  --s3: 0 4px 16px rgba(10,45,66,.08), 0 12px 40px rgba(10,45,66,.14);

  /* Tokens */
  --r-sm: 12px;
  --r-md: 18px;
  --r-lg: 24px;
  --r-xl: 32px;

  /* Typography */
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans:  'Inter', system-ui, sans-serif;

  /* Compat */
  --palm: var(--teal);
  --palm-light: var(--teal-lt);
  --radius: var(--r-md);
  --radius-lg: var(--r-lg);
  --shadow: var(--s1);
  --shadow-lg: var(--s3);
  --font-serif: var(--serif);
  --font-sans: var(--sans);
}

/* ── DARK MODE ── */
[data-theme="dark"] {
  --sand:   #07161f;
  --sand2:  #0f2535;
  --white:  #0d1e2b;
  --text:   #d8eaf4;
  --text-md:#7ab4cc;
  --text-lt:#4a7a90;
  --ocean:  #04111a;
  --teal:   #2a9bbf;
  --teal-lt:#50c0de;
  --gold:   #d4a84b;
  --s1: 0 1px 3px rgba(0,0,0,.2), 0 2px 8px rgba(0,0,0,.3);
  --s2: 0 2px 8px rgba(0,0,0,.2), 0 6px 24px rgba(0,0,0,.35);
  --s3: 0 4px 16px rgba(0,0,0,.25), 0 12px 40px rgba(0,0,0,.45);
}
[data-theme="dark"] body { background: var(--sand); }
[data-theme="dark"] .nav-tabs { background: #091520; border-bottom-color: rgba(255,255,255,.06); }
[data-theme="dark"] .nav-tab.active { background: rgba(42,155,191,.18); color: var(--teal-lt); }
[data-theme="dark"] .nav-tab:hover:not(.active) { background: rgba(255,255,255,.04); }
[data-theme="dark"] .card,
[data-theme="dark"] .event-card,
[data-theme="dark"] .service-item,
[data-theme="dark"] .info-card,
[data-theme="dark"] .request-form { background: #0d1e2b; border-color: rgba(255,255,255,.06); }
[data-theme="dark"] .card-body,
[data-theme="dark"] .detail-row { border-color: rgba(255,255,255,.06); }
[data-theme="dark"] .hero { background: linear-gradient(170deg,#020c13 0%,#061828 40%,#0a2d42 100%); }
[data-theme="dark"] .hero h1 { color: #fff; text-shadow: 0 4px 40px rgba(0,0,0,.8); }
[data-theme="dark"] .section-title { color: var(--text); }
[data-theme="dark"] .ann-msg { color: var(--text); }

/* ── RESET ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--sans);
  background: var(--sand);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
#guest-view { display: block; }
#admin-view { display: none; }

/* ── HERO ── */
.hero {
  background: linear-gradient(170deg, #020e18 0%, #082336 30%, #0e3d58 60%, #1a6b8a 100%);
  padding: 64px 24px 72px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(42,155,191,.18) 0%, transparent 70%),
    url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.025'%3E%3Cpath d='M40 0L80 40L40 80L0 40z'/%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
}
.hero::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0; right: 0;
  height: 32px;
  background: linear-gradient(to bottom, transparent, var(--sand));
  pointer-events: none;
}
.hero-leaves { position: absolute; font-size: 100px; opacity: .05; pointer-events: none; }
.hero-leaves.l1 { top: -15px; left: -25px; transform: rotate(-25deg); }
.hero-leaves.l2 { top: 10px; right: -15px; transform: rotate(15deg); }
.hero-leaves.l3 { bottom: -25px; left: 45%; transform: rotate(8deg); }

.hotel-label {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--gold-lt);
  opacity: .9;
  margin-bottom: 16px;
}
.hero h1 {
  font-family: var(--serif);
  font-size: 54px;
  font-weight: 500;
  color: #fff;
  line-height: 1.05;
  margin-bottom: 14px;
  letter-spacing: .5px;
  text-shadow: 0 4px 40px rgba(0,0,0,.35);
}
.hero-sub {
  font-size: 11px;
  color: rgba(255,255,255,.45);
  letter-spacing: 4px;
  font-weight: 400;
  text-transform: uppercase;
}
.hero-hotel-name-bar {
  display: inline-block;
  margin-top: 18px;
  padding: 8px 22px;
  background: rgba(255,255,255,.1);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,.18);
  border-radius: 30px;
  font-size: 12px;
  font-weight: 500;
  color: rgba(255,255,255,.85);
  letter-spacing: .5px;
}
.hero-room-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.18);
  border-radius: 20px; padding: 4px 12px;
  font-size: 12px; color: rgba(255,255,255,.8);
  margin-top: 8px; cursor: pointer;
}
.hero-welcome-wrap { margin-top: 6px; }

/* Weather */
.weather-bar {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px; padding: 8px 18px;
  background: rgba(255,255,255,.1);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 30px; margin: 14px auto 0;
  color: rgba(255,255,255,.9);
  font-size: 13px; font-weight: 500;
  letter-spacing: .3px; cursor: pointer;
  transition: background .2s; white-space: nowrap;
}
.weather-bar:hover { background: rgba(255,255,255,.18); }
.weather-icon { font-size: 18px; line-height: 1; }
.weather-temp { font-family: var(--serif); font-size: 17px; font-weight: 600; }
.weather-desc { font-size: 11px; opacity: .75; text-transform: capitalize; }

/* Dark toggle */
.dark-toggle {
  position: fixed; top: 14px; right: 14px; z-index: 200;
  background: rgba(255,255,255,.12);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 50%; width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; cursor: pointer; transition: all .2s;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
.dark-toggle:hover { background: rgba(255,255,255,.22); transform: scale(1.08); }
[data-theme="dark"] .dark-toggle { background: rgba(0,0,0,.35); border-color: rgba(255,255,255,.12); }

/* ── LIVE EVENTS ── */
.live-events-wrap { overflow: hidden; max-height: 0; transition: max-height .4s ease; background: linear-gradient(90deg,#0a2d42,#1a5f7a); }
.live-events-wrap.show { max-height: 200px; }
.live-events-scroll { display: flex; overflow-x: auto; scrollbar-width: none; }
.live-events-scroll::-webkit-scrollbar { display: none; }
.live-event-item { flex-shrink: 0; display: flex; align-items: center; gap: 10px; padding: 11px 18px; border-right: 1px solid rgba(255,255,255,.07); min-width: 200px; max-width: 260px; cursor: pointer; transition: background .15s; }
.live-event-item:hover { background: rgba(255,255,255,.06); }
.live-event-dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; flex-shrink: 0; box-shadow: 0 0 0 3px rgba(76,175,80,.2); animation: pulse-live 2s infinite; }
@keyframes pulse-live { 0%,100%{box-shadow:0 0 0 3px rgba(76,175,80,.2);}50%{box-shadow:0 0 0 6px rgba(76,175,80,.1);} }
.live-event-text { flex: 1; min-width: 0; }
.live-event-name { font-size: 13px; font-weight: 600; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.live-event-time { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 1px; }
.live-event-icon { font-size: 18px; flex-shrink: 0; }

/* ── ANNOUNCEMENT ── */
.ann-banner-wrap { overflow: hidden; max-height: 0; transition: max-height .4s ease; }
.ann-banner-wrap.show { max-height: 140px; }
.announcement-banner { display: flex; padding: 13px 16px; gap: 10px; align-items: center; }
.announcement-banner.info    { background: linear-gradient(90deg,#e6f4fb,#f2f9ff); border-left: 3px solid #2a9bbf; }
.announcement-banner.warning { background: linear-gradient(90deg,#fffbec,#fffde8); border-left: 3px solid #f0a500; }
.announcement-banner.urgent  { background: linear-gradient(90deg,#fff0f0,#fff5f5); border-left: 3px solid #e05555; }
.announcement-banner.success { background: linear-gradient(90deg,#f0faf0,#f7ffe8); border-left: 3px solid #3cb87a; }
[data-theme="dark"] .announcement-banner.info    { background: linear-gradient(90deg,#0d2d3a,#0f3040); border-left-color:#2a9bbf; }
[data-theme="dark"] .announcement-banner.warning { background: linear-gradient(90deg,#281e00,#2c2100); border-left-color:#f0a500; }
[data-theme="dark"] .announcement-banner.urgent  { background: linear-gradient(90deg,#280a0a,#2d0c0c); border-left-color:#e05555; }
[data-theme="dark"] .announcement-banner.success { background: linear-gradient(90deg,#0e1f0e,#112211); border-left-color:#3cb87a; }
.ann-badge { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; padding: 3px 9px; border-radius: 20px; flex-shrink: 0; }
.ann-badge.info    { background: #2a9bbf; color: white; }
.ann-badge.warning { background: #f0a500; color: white; }
.ann-badge.urgent  { background: #e05555; color: white; animation: pulse-badge 1.5s infinite; }
.ann-badge.success { background: #3cb87a; color: white; }
@keyframes pulse-badge { 0%,100%{opacity:1;}50%{opacity:.6;} }
.ann-body { flex: 1; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.ann-title { font-size: 14px; flex-shrink: 0; }
.ann-msg { font-size: 14px; line-height: 1.4; color: var(--text); font-weight: 500; }
.ann-banner-wrap button { background: none; border: none; font-size: 20px; color: var(--text-md); cursor: pointer; flex-shrink: 0; padding: 0 4px; line-height: 1; }

/* ── LANG BAR ── */
.lang-bar { background: var(--white); padding: 9px 14px; display: flex; gap: 2px; overflow-x: auto; border-bottom: 1px solid rgba(10,45,66,.07); scrollbar-width: none; }
.lang-bar::-webkit-scrollbar { display: none; }
.lang-btn { flex-shrink: 0; border-radius: 50%; border: 2px solid transparent; background: none; font-size: 20px; cursor: pointer; transition: all .2s; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
.lang-btn.active { border-color: var(--gold); background: rgba(201,168,76,.1); box-shadow: 0 0 0 3px rgba(201,168,76,.1); }
.lang-btn:hover:not(.active) { background: var(--sand2); border-radius: 50%; }

/* ── NAV TABS ── */
.nav-tabs {
  background: var(--white);
  display: flex; overflow-x: auto; scrollbar-width: none;
  position: sticky; top: 0; z-index: 10;
  padding: 8px 12px; gap: 4px; align-items: center;
  border-bottom: 1px solid rgba(10,45,66,.07);
  box-shadow: 0 4px 20px rgba(10,45,66,.06);
}
.nav-tabs::-webkit-scrollbar { display: none; }
.nav-tab {
  flex-shrink: 0; padding: 7px 15px;
  border: none; background: none;
  font-family: var(--sans); font-size: 13px; font-weight: 500;
  color: var(--text-md); cursor: pointer;
  border-radius: 20px; transition: all .2s;
  white-space: nowrap; letter-spacing: .01em;
}
.nav-tab.active { color: var(--ocean); background: var(--sand2); font-weight: 600; }
.nav-tab:hover:not(.active) { color: var(--text); background: var(--sand); }

/* ── CONTENT ── */
.content-area { padding: 24px 16px 100px; max-width: 640px; margin: 0 auto; }
.section-title {
  font-family: var(--serif);
  font-size: 36px; font-weight: 500; color: var(--text);
  margin-bottom: 4px; letter-spacing: .2px;
}
.section-sub {
  font-size: 11px; color: var(--text-lt);
  margin-bottom: 24px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 500;
}

/* ── OUTLET CARDS ── */
.card {
  background: var(--white);
  border-radius: var(--r-lg);
  margin-bottom: 14px;
  overflow: hidden;
  box-shadow: var(--s1);
  border: 1px solid rgba(10,45,66,.05);
  transition: box-shadow .3s, transform .3s;
}
.card:hover { box-shadow: var(--s3); transform: translateY(-3px); }
.card-photo-wrap { overflow: hidden; position: relative; }
.card-photo { width: 100%; height: 190px; object-fit: cover; display: block; transition: transform .4s ease; cursor: pointer; }
.card:hover .card-photo { transform: scale(1.04); }
.card-photo-overlay {
  position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
  background: linear-gradient(transparent, rgba(6,26,40,.5));
}
.card-header { padding: 16px 18px; cursor: pointer; display: flex; align-items: center; gap: 14px; }
.card-icon {
  width: 50px; height: 50px; border-radius: 15px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
  box-shadow: 0 3px 10px rgba(10,45,66,.12);
}
.icon-restaurant { background: linear-gradient(135deg,#fff3e0,#ffcc80); }
.icon-bar        { background: linear-gradient(135deg,#e3f2fd,#90caf9); }
.icon-pool       { background: linear-gradient(135deg,#e0f7fa,#80deea); }
.icon-spa        { background: linear-gradient(135deg,#f3e5f5,#ce93d8); }
.card-info { flex: 1; min-width: 0; }
.card-name {
  font-family: var(--serif);
  font-size: 21px; font-weight: 500; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  letter-spacing: .2px;
}
.card-hours { font-size: 12px; color: var(--text-lt); margin-top: 4px; display: flex; align-items: center; gap: 5px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.status-dot.open   { background: var(--green); box-shadow: 0 0 0 3px rgba(60,184,122,.15); }
.status-dot.closed { background: var(--red); }
.card-arrow { color: var(--sand2); font-size: 22px; transition: transform .25s; flex-shrink: 0; }
.card.expanded .card-arrow { transform: rotate(90deg); }
.card-body { display: none; padding: 0 20px 20px; border-top: 1px solid rgba(10,45,66,.06); }
.card.expanded .card-body { display: block; }
.card-desc { font-size: 14px; color: var(--text-md); line-height: 1.75; margin: 16px 0; }
.detail-row { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid rgba(10,45,66,.06); font-size: 14px; }
.detail-row:last-child { border-bottom: none; }
.detail-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--text-lt); width: 100px; flex-shrink: 0; padding-top: 2px; }
.detail-val { color: var(--text); flex: 1; }
.menu-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(10,45,66,.06); }
.menu-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-lt); margin-bottom: 10px; }
.menu-text { font-size: 14px; line-height: 1.8; color: var(--text-md); white-space: pre-line; }

/* ── EVENT CARDS ── */
.event-card {
  background: var(--white);
  border-radius: var(--r-lg); margin-bottom: 14px;
  overflow: hidden;
  border: 1px solid rgba(10,45,66,.05);
  box-shadow: var(--s1);
  transition: box-shadow .3s, transform .3s;
}
.event-card:hover { box-shadow: var(--s3); transform: translateY(-3px); }
.event-photo { width: 100%; height: 160px; object-fit: cover; display: block; }
.event-date-strip { display: flex; align-items: center; gap: 14px; padding: 16px 18px; }
.event-date-box {
  background: linear-gradient(135deg, var(--ocean), var(--teal));
  border-radius: 14px; padding: 10px 14px;
  text-align: center; color: white; flex-shrink: 0; min-width: 58px;
  box-shadow: 0 4px 14px rgba(10,45,66,.25);
}
.event-day { font-family: var(--serif); font-size: 28px; font-weight: 600; line-height: 1; }
.event-month { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; opacity: .8; margin-top: 3px; font-weight: 600; }
.event-title-wrap { flex: 1; min-width: 0; }
.event-title { font-family: var(--serif); font-size: 21px; font-weight: 500; color: var(--text); }
.event-time { font-size: 12px; color: var(--text-lt); margin-top: 4px; display: flex; align-items: center; gap: 4px; }
.event-body { padding: 0 18px 16px; }
.event-desc { font-size: 14px; color: var(--text-md); line-height: 1.7; }
.event-location { display: inline-flex; align-items: center; gap: 5px; margin-top: 8px; font-size: 13px; color: var(--teal); background: rgba(26,107,138,.08); padding: 5px 12px; border-radius: 20px; }

/* ── SERVICE GRID ── */
.service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.service-item {
  background: var(--white);
  border-radius: var(--r-md);
  padding: 20px 16px; text-align: center;
  border: 1px solid rgba(10,45,66,.05);
  box-shadow: var(--s1);
  transition: box-shadow .3s, transform .3s;
  cursor: default;
}
.service-item:hover { box-shadow: var(--s2); transform: translateY(-2px); }
.s-icon { font-size: 32px; margin-bottom: 10px; }
.s-name { font-family: var(--serif); font-size: 17px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
.s-info { font-size: 12px; color: var(--text-lt); line-height: 1.6; }

/* ── GALLERY ── */
.gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.gallery-item { border-radius: var(--r-sm); overflow: hidden; aspect-ratio: 1; cursor: pointer; position: relative; box-shadow: var(--s1); }
.gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s; }
.gallery-item:hover img { transform: scale(1.06); }
.gallery-item-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 8px 10px; background: linear-gradient(transparent,rgba(6,26,40,.7)); color: white; font-size: 12px; font-weight: 500; }

/* ── HOTEL INFO ── */
.info-card {
  background: var(--white);
  border-radius: var(--r-lg); padding: 22px;
  margin-bottom: 14px;
  border: 1px solid rgba(10,45,66,.06);
  box-shadow: var(--s1);
}
.info-card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
.info-card-icon {
  width: 48px; height: 48px; border-radius: 14px;
  background: linear-gradient(135deg, rgba(10,45,66,.08), rgba(26,107,138,.15));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(10,45,66,.1);
}
.info-card-title { font-family: var(--serif); font-size: 21px; font-weight: 500; color: var(--text); }
.checkin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 4px; }
.checkin-box {
  background: linear-gradient(135deg, var(--ocean), var(--teal));
  border-radius: 16px; padding: 18px; text-align: center; color: white;
  box-shadow: 0 4px 18px rgba(10,45,66,.22);
}
.checkin-box.out { background: linear-gradient(135deg, #031018, var(--ocean)); }
.checkin-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; opacity: .75; margin-bottom: 8px; font-weight: 600; }
.checkin-time { font-family: var(--serif); font-size: 36px; font-weight: 600; line-height: 1; letter-spacing: 1px; }
.rules-list { list-style: none; }

function renderLiveEvents(){
  const wrap=document.getElementById('live-events-wrap');
  const scroll=document.getElementById('live-events-scroll');
  if(!wrap||!scroll)return;
  const now=new Date();
  const todayStr=now.toISOString().split('T')[0];
  const curMin=now.getHours()*60+now.getMinutes();

  const active=C.events.filter(function(ev){
    if(ev.event_date!==todayStr)return false;
    if(!ev.event_time)return true; // saati yoksa bugünkü tüm etkinlikler
    const m=ev.event_time.match(/(\d{1,2}):(\d{2})/);
    if(!m)return true;
    const start=+m[1]*60+ +m[2];
    const end=start+180; // varsayılan 3 saat
    return curMin>=start&&curMin<end;
  });

  scroll.innerHTML='';
  if(!active.length){wrap.classList.remove('show');return;}

  active.forEach(function(ev){
    const name=ev.names?.[lang]||ev.names?.en||ev.names?.tr||'Etkinlik';
    const time=ev.event_time?(ev.event_time.slice(0,5)):'';
    const item=document.createElement('div');
    item.className='live-event-item';
    item.innerHTML='<div class="live-event-icon">'+(ev.icon||'🎉')+'</div>'
      +'<div class="live-event-text">'
        +'<div class="live-event-name">'+name+'</div>'
        +(time?(function(){
      const endT=ev.event_end_time?ev.event_end_time.slice(0,5):'';
      return '<div class="live-event-time">🕐 '+time+(endT?' – '+endT:'')+' · '+t('ongoing')+'</div>';
    })():'')
      +'</div>'
      +'<div class="live-event-dot"></div>';
    item.onclick=function(){setTab('events');};
    item.style.cursor='pointer';
    scroll.appendChild(item);
  });
  wrap.classList.add('show');
}

function renderAnn(){
  const a=C.announcements[0];
  const wrap=document.getElementById('ann-banner-wrap');
  const banner=document.getElementById('ann-banner');
  if(!a){wrap.classList.remove('show');return;}
  const msg=a.messages?.[lang]||(lang!=='en'?a.messages?.en:'')||a.messages?.tr||a.messages?.[Object.keys(a.messages||{}).find(k=>a.messages[k])]||'';
  if(!msg){wrap.classList.remove('show');return;}
  // Tarih kontrolü
  if(a.start_date||a.end_date){
    const todayStr=new Date().toISOString().split('T')[0];
    if(a.start_date&&todayStr<a.start_date){wrap.classList.remove('show');return;}
    if(a.end_date&&todayStr>a.end_date){wrap.classList.remove('show');return;}
  }
  // Saat kontrolü
  if(a.start_time||a.end_time){
    const now=new Date();const cur=now.getHours()*60+now.getMinutes();
    const toMin=function(t){if(!t)return null;const m=t.match(/(\d{1,2}):(\d{2})/);return m?+m[1]*60+ +m[2]:null;};
    const st=toMin(a.start_time),et=toMin(a.end_time);
    if(st!==null&&cur<st){wrap.classList.remove('show');return;}
    if(et!==null&&cur>=et){wrap.classList.remove('show');return;}
  }
  const type=a.type||'info';
  const badgeLabels={info:t('ann_info'),warning:t('ann_warning'),urgent:t('ann_urgent'),success:t('ann_success')};
  const titleLabels={info:'ℹ️',warning:'⚠️',urgent:'🚨',success:'✅'};
  document.getElementById('ann-text').textContent=msg;
  const badge=document.getElementById('ann-badge');
  badge.textContent=badgeLabels[type]||t('ann_info');
  badge.className=`ann-badge ${type}`;
  const title=document.getElementById('ann-title');
  title.textContent=titleLabels[type]||'ℹ️';
  title.className='ann-title '+type;
  banner.className=`announcement-banner ${type}`;
  wrap.classList.add('show');
}

     {label:'👁️ Okundu',count:read,pct:pct(read),color:'var(--palm)'},

      const avgMs=solvedWithTime.reduce(function(sum,r){return sum+(new Date(r.updated_at)-new Date(r.created_at));},0)/solvedWithTime.length;

      ac.appendChild(avgCard);

  // ── Son Talepler ──
  const sec1=document.createElement('div');sec1.className='dash-section';sec1.textContent='Son Talepler';ac.appendChild(sec1);

  if(!C.requests.length){

  } else {

      const d=new Date(r.created_at);
      const ts=d.toLocaleDateString('tr-TR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      const msg=r.message.length>55?r.message.slice(0,55)+'…':r.message;
      const room=r.room_number?'<span style="font-size:11px;color:var(--text-soft)">🚪'+r.room_number+'</span>':'';
      const colors={unread:'var(--gold)',read:'var(--palm)',resolved:'#4caf50'};
      const row=document.createElement('div');row.className='da-row';
      row.innerHTML='<div class="da-dot" style="background:'+(colors[r.status]||'rgba(255,255,255,.2)')+'"></div>'
        +'<div class="da-text">'+msg+' '+room+'</div>'
        +'<div class="da-time">'+ts+'</div>';
      act1.appendChild(row);
    });
  }
  ac.appendChild(act1);

  // Aktif duyurular
  if(C.announcements.length){
    const sec2=document.createElement('div');sec2.className='dash-section';sec2.textContent='Aktif Duyurular';ac.appendChild(sec2);
    const act2=document.createElement('div');act2.className='dash-activity';

      const typeColors={info:'var(--palm)',warning:'#f9a825',urgent:'#ef9a9a',success:'#4caf50'};
      const row=document.createElement('div');row.className='da-row';
      const annTimeInfo=(a.start_time||a.end_time)?' · '+(a.start_time||'')+(a.end_time?' – '+a.end_time:''):'';
      const annDateInfo=(a.start_date||a.end_date)?' 📅 '+(a.start_date||'')+(a.end_date?' – '+a.end_date:''):'';

function loadTrafficChart(wrap,days){
  wrap.innerHTML='<div style="color:var(--text-soft);font-size:13px;text-align:center;padding:20px">Yükleniyor…</div>';
  const since=new Date();since.setDate(since.getDate()-days);
  sb.from('page_views').select('viewed_at').gte('viewed_at',since.toISOString()).then(function(res){
    wrap.innerHTML='';
    if(!res.data||!res.data.length){wrap.innerHTML='<div style="padding:14px;text-align:center;color:var(--text-soft);font-size:13px">Henüz veri yok</div>';return;}
    // Günlük sayılar
    const counts={};
    for(let i=0;i<days;i++){
      const d=new Date();d.setDate(d.getDate()-i);
      counts[d.toISOString().split('T')[0]]=0;
    }
    res.data.forEach(function(r){const d=r.viewed_at.split('T')[0];if(counts[d]!==undefined)counts[d]++;});
    const labels=Object.keys(counts).sort();
    const vals=labels.map(function(k){return counts[k];});
    const maxVal=Math.max(...vals)||1;
    const W=320,H=80,pad=8;
    const barW=Math.max(2,Math.floor((W-pad*2)/labels.length)-2);
    let svg='<svg viewBox="0 0 '+W+' '+(H+20)+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;overflow:visible">';
    // Izgara
    for(let i=1;i<=3;i++){
      const y=H-Math.round(H*i/4)+pad;
      svg+='<line x1="'+pad+'" y1="'+y+'" x2="'+(W-pad)+'" y2="'+y+'" stroke="rgba(255,255,255,.05)" stroke-width="1"/>';
    }
    labels.forEach(function(label,i){
      const x=pad+i*((W-pad*2)/labels.length);
      const bh=Math.round((counts[label]/maxVal)*(H-pad));
      const y=H-bh+pad;
      const isToday=label===new Date().toISOString().split('T')[0];
      svg+='<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+bh+'" rx="3" fill="'+(isToday?'var(--gold)':'var(--palm)')+'" opacity="'+(isToday?'1':'.65')+'"/>';
      if(counts[label]>0)svg+='<text x="'+(x+barW/2)+'" y="'+(y-3)+'" text-anchor="middle" fill="rgba(255,255,255,.6)" font-size="8">'+counts[label]+'</text>';
    });
    // X eksen etiketleri (sadece ilk, orta, son)
    if(labels.length>1){
      const fmt=function(d){const dt=new Date(d);return (dt.getDate()+'/'+(dt.getMonth()+1));};
      svg+='<text x="'+pad+'" y="'+(H+18)+'" fill="rgba(255,255,255,.3)" font-size="9">'+fmt(labels[0])+'</text>';
      svg+='<text x="'+(W/2)+'" y="'+(H+18)+'" text-anchor="middle" fill="rgba(255,255,255,.3)" font-size="9">'+fmt(labels[Math.floor(labels.length/2)])+'</text>';
      svg+='<text x="'+(W-pad)+'" y="'+(H+18)+'" text-anchor="end" fill="rgba(255,255,255,.3)" font-size="9">'+fmt(labels[labels.length-1])+'</text>';
    }
    svg+='</svg>';
    wrap.innerHTML=svg;
  });
}

function drawHourChart(wrap,hrs,maxH){
  const W=320,H=60,pad=8;
  const barW=Math.max(2,Math.floor((W-pad*2)/24)-1);
  let svg='<svg viewBox="0 0 '+W+' '+(H+20)+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;overflow:visible">';
  const curH=new Date().getHours();
  hrs.forEach(function(v,i){
    const x=pad+i*((W-pad*2)/24);
    const bh=Math.round((v/maxH)*(H-pad));
    const y=H-bh+pad;
    const isCur=i===curH;
    svg+='<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+bh+'" rx="2" fill="'+(isCur?'var(--gold)':'var(--palm)')+'" opacity="'+(isCur?'1':'.65')+'"/>';
  });
  // Saat etiketleri
  [0,6,12,18,23].forEach(function(h){
    const x=pad+h*((W-pad*2)/24);
    svg+='<text x="'+x+'" y="'+(H+16)+'" fill="rgba(255,255,255,.3)" font-size="9">'+h+'</text>';
  });
  svg+='</svg>';
  wrap.innerHTML='<div style="font-size:11px;color:var(--text-soft);margin-bottom:8px;font-weight:600;letter-spacing:.8px;text-transform:uppercase">Saat Dağılımı</div>'+svg;
}


function renderTabSettings(ac){

    {id:'restaurants',icon:'🍽️',label:'Restoranlar'},
    {id:'bars',icon:'🍸',label:'Barlar'},
    {id:'alacarte',icon:'🥘',label:'À la Carte'},
    {id:'pools',icon:'🏊',label:'Havuz & Spa'},
    {id:'events',icon:'🎉',label:'Etkinlikler'},
    {id:'services',icon:'🛎️',label:'Genel Hizmetler'},
    {id:'extraservices',icon:'⭐',label:'Ekstra Hizmetler'},
    {id:'gallery',icon:'📸',label:'Galeri'},
    {id:'hotelmap',icon:'🗺️',label:'Harita'},
    {id:'tour360',icon:'🔮',label:'360° Tur'},
    {id:'hotelinfo',icon:'🏨',label:'Otel Bilgisi'},
    {id:'request',icon:'💬',label:'Öneri & Şikayet'},
  ];

  // Mevcut sırayı uygula
  const savedOrder=(C.config.tab_order||'').split(',').filter(Boolean);
  const hidden=(C.config.hidden_tabs||'').split(',').filter(Boolean);
  let orderedTabs=savedOrder.length
    ? ALL_TABS.slice().sort(function(a,b){
        const ai=savedOrder.indexOf(a.id),bi=savedOrder.indexOf(b.id);
        if(ai===-1&&bi===-1)return 0;if(ai===-1)return 1;if(bi===-1)return -1;return ai-bi;
      })
    : ALL_TABS.slice();

  const title=document.createElement('div');
  title.style.cssText='font-family:var(--font-serif);font-size:22px;font-weight:700;margin-bottom:4px;color:var(--text)';
  title.textContent='Sekme Yönetimi';
  const sub=document.createElement('div');
  sub.style.cssText='font-size:13px;color:var(--text-soft);margin-bottom:16px';
  sub.textContent='Görünürlük için toggle — sıra için ☰ tutup sürükle.';
  ac.appendChild(title);ac.appendChild(sub);

  const list=document.createElement('div');
  list.id='tab-sort-list';
  list.style.cssText='background:var(--white);border-radius:16px;border:1px solid var(--sand2);overflow:hidden;box-shadow:var(--shadow)';

  function buildRows(){
    list.innerHTML='';
    orderedTabs.forEach(function(t,i){
      const isVisible=!hidden.includes(t.id);
      const row=document.createElement('div');
      row.dataset.id=t.id;
      row.style.cssText='display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--white);'+(i<orderedTabs.length-1?'border-bottom:1px solid var(--sand2)':'');

      // Sürükleme tutacağı
      const handle=document.createElement('div');
      handle.textContent='☰';
      handle.style.cssText='font-size:16px;color:var(--text-soft);cursor:grab;flex-shrink:0;touch-action:none;padding:2px 4px;';
      handle.title='Sırala';

      const icon=document.createElement('div');
      icon.style.cssText='font-size:20px;width:32px;text-align:center;flex-shrink:0';
      icon.textContent=t.icon;

      const lbl=document.createElement('div');
      lbl.style.cssText='flex:1;font-size:15px;font-weight:500;color:var(--text)'+(isVisible?'':';opacity:.45');
      lbl.textContent=t.label;

      // Toggle switch
      const toggleWrap=document.createElement('label');
      toggleWrap.style.cssText='position:relative;width:48px;height:26px;flex-shrink:0;cursor:pointer';
      const inp=document.createElement('input');
      inp.type='checkbox';inp.style.display='none';inp.checked=isVisible;
      const slider=document.createElement('div');
      slider.style.cssText='position:absolute;inset:0;border-radius:13px;background:'+(isVisible?'var(--palm)':'var(--sand2)')+';transition:background .2s';
      const knob=document.createElement('div');
      knob.style.cssText='position:absolute;top:3px;left:'+(isVisible?'25px':'3px')+';width:20px;height:20px;border-radius:50%;background:white;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:left .2s';
      slider.appendChild(knob);toggleWrap.appendChild(inp);toggleWrap.appendChild(slider);

      inp.onchange=async function(){
        const checked=inp.checked;
        slider.style.background=checked?'var(--palm)':'var(--sand2)';
        knob.style.left=checked?'25px':'3px';
        lbl.style.opacity=checked?'1':'0.45';
        const idx=hidden.indexOf(t.id);
        if(checked){if(idx>-1)hidden.splice(idx,1);}
        else{if(idx===-1)hidden.push(t.id);}
        const val=hidden.join(',');
        C.config.hidden_tabs=val;
        await sb.from('hotel_config').upsert({key:'hidden_tabs',value:val});
        renderG();
        showToast(checked?t.icon+' '+t.label+' gösterildi':t.icon+' '+t.label+' gizlendi');
      };

      row.appendChild(handle);row.appendChild(icon);row.appendChild(lbl);row.appendChild(toggleWrap);
      list.appendChild(row);

      // ── Drag & Drop ──
      let dragSrc=null;
      handle.addEventListener('mousedown',function(e){startDrag(e,row);});
      handle.addEventListener('touchstart',function(e){startDrag(e,row);},{passive:true});
    });
  }

  // ── Sürükleme motoru ──
  let dragEl=null,placeholder=null,startY=0,listY=0;
  function startDrag(e,row){
    dragEl=row;
    const rect=row.getBoundingClientRect();
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    startY=clientY-rect.top;
    listY=list.getBoundingClientRect().top;
    row.style.cssText+=';opacity:.5;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:10;position:relative;';
    placeholder=document.createElement('div');
    placeholder.style.cssText='height:'+rect.height+'px;background:rgba(26,95,122,.06);border-radius:8px;margin:2px 0;transition:height .15s;';
    row.after(placeholder);
  }
  function onMove(e){
    if(!dragEl)return;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    const rows=[...list.querySelectorAll('[data-id]')].filter(function(r){return r!==dragEl;});
    let after=null;
    for(let r of rows){
      const box=r.getBoundingClientRect();
      if(clientY>box.top+box.height/2)after=r;
    }
    if(after){after.after(placeholder);}
    else if(rows.length){rows[0].before(placeholder);}
  }
  async function onEnd(){
    if(!dragEl)return;
    dragEl.style.opacity='';dragEl.style.boxShadow='';dragEl.style.position='';dragEl.style.zIndex='';
    placeholder.replaceWith(dragEl);
    placeholder=null;
    // Yeni sırayı oku
    const newOrder=[...list.querySelectorAll('[data-id]')].map(function(r){return r.dataset.id;});
    orderedTabs=newOrder.map(function(id){return ALL_TABS.find(function(t){return t.id===id;});}).filter(Boolean);
    C.config.tab_order=newOrder.join(',');
    await sb.from('hotel_config').upsert({key:'tab_order',value:newOrder.join(',')});
    renderG();
    showToast('✓ Sekme sırası kaydedildi');
    dragEl=null;
    buildRows();
  }
  document.addEventListener('mousemove',onMove);
  document.addEventListener('touchmove',onMove,{passive:true});
  document.addEventListener('mouseup',onEnd);
  document.addEventListener('touchend',onEnd);

  buildRows();
  ac.appendChild(list);

  const note=document.createElement('div');
  note.style.cssText='margin-top:14px;padding:12px 14px;background:rgba(26,95,122,.06);border-radius:12px;font-size:12px;color:var(--text-soft);line-height:1.6';
  note.innerHTML='💡 <strong>Not:</strong> Kapatılan sekmeler misafir arayüzünden gizlenir. Sıra değişikliği anında uygulanır.';
  ac.appendChild(note);
}

function renderHotelMap(ca){
  ca.innerHTML='';
  const title=document.createElement('div');title.className='section-title';title.textContent=t('map_tab');
  const sub=document.createElement('div');sub.className='section-sub';sub.textContent='🗺️';
  ca.appendChild(title);ca.appendChild(sub);

  const mapUrl=C.config.hotel_map_url||'';
  if(!mapUrl){
    const empty=document.createElement('div');empty.className='map-empty';
    empty.innerHTML='<div class="map-empty-icon">🗺️</div><div class="map-empty-text">Harita henüz yüklenmemiş</div>';
    ca.appendChild(empty);
    return;
  }

  // Pinch-zoom + pan container
  const wrap=document.createElement('div');wrap.className='map-container';
  wrap.style.height='65vh';
  const img=document.createElement('img');img.src=mapUrl;img.alt='Otel Haritası';
  img.style.cssText='width:100%;height:100%;object-fit:contain;transform-origin:center center;';
  wrap.appendChild(img);
  ca.appendChild(wrap);

  // Zoom kontrolleri
  const ctrl=document.createElement('div');ctrl.className='map-controls';
  const btnIn=document.createElement('button');btnIn.className='map-ctrl-btn';btnIn.textContent='＋';btnIn.title='Yakınlaştır';
  const btnOut=document.createElement('button');btnOut.className='map-ctrl-btn';btnOut.textContent='－';btnOut.title='Uzaklaştır';
  const btnReset=document.createElement('button');btnReset.className='map-ctrl-btn';btnReset.textContent='⊙';btnReset.title='Sıfırla';
  ctrl.appendChild(btnOut);ctrl.appendChild(btnReset);ctrl.appendChild(btnIn);
  ca.appendChild(ctrl);

  // Zoom/pan state
  let scale=1,tx=0,ty=0;
  const MIN=1,MAX=5;

  function applyTransform(){
    img.style.transform='translate('+tx+'px,'+ty+'px) scale('+scale+')';
  }
  function clampTranslate(){
    const ww=wrap.offsetWidth,wh=wrap.offsetHeight;
    const maxX=ww*(scale-1)/2,maxY=wh*(scale-1)/2;
    tx=Math.max(-maxX,Math.min(maxX,tx));
    ty=Math.max(-maxY,Math.min(maxY,ty));
  }

  btnIn.onclick=function(){scale=Math.min(MAX,scale+0.5);clampTranslate();applyTransform();};
  btnOut.onclick=function(){scale=Math.max(MIN,scale-0.5);if(scale===1){tx=0;ty=0;}clampTranslate();applyTransform();};
  btnReset.onclick=function(){scale=1;tx=0;ty=0;applyTransform();};

  // Mouse drag
  let dragging=false,startX=0,startY=0,startTx=0,startTy=0;
  wrap.addEventListener('mousedown',function(e){if(scale<=1)return;dragging=true;startX=e.clientX;startY=e.clientY;startTx=tx;startTy=ty;e.preventDefault();});
  window.addEventListener('mousemove',function(e){if(!dragging)return;tx=startTx+(e.clientX-startX);ty=startTy+(e.clientY-startY);clampTranslate();applyTransform();});
  window.addEventListener('mouseup',function(){dragging=false;});

  // Touch drag + pinch zoom
  let lastDist=0,lastMidX=0,lastMidY=0,touchDragging=false,touchStartX=0,touchStartY=0;
  wrap.addEventListener('touchstart',function(e){
    if(e.touches.length===2){
      const t1=e.touches[0],t2=e.touches[1];
      lastDist=Math.hypot(t2.clientX-t1.clientX,t2.clientY-t1.clientY);
      lastMidX=(t1.clientX+t2.clientX)/2;lastMidY=(t1.clientY+t2.clientY)/2;
    } else if(e.touches.length===1&&scale>1){
      touchDragging=true;touchStartX=e.touches[0].clientX-tx;touchStartY=e.touches[0].clientY-ty;
    }
    e.preventDefault();
  },{passive:false});
  wrap.addEventListener('touchmove',function(e){
    if(e.touches.length===2){
      const t1=e.touches[0],t2=e.touches[1];
      const dist=Math.hypot(t2.clientX-t1.clientX,t2.clientY-t1.clientY);
      const ds=dist/lastDist;
      scale=Math.max(MIN,Math.min(MAX,scale*ds));
      lastDist=dist;clampTranslate();applyTransform();
    } else if(touchDragging&&e.touches.length===1){
      tx=e.touches[0].clientX-touchStartX;ty=e.touches[0].clientY-touchStartY;clampTranslate();applyTransform();
    }
    e.preventDefault();
  },{passive:false});
  wrap.addEventListener('touchend',function(){touchDragging=false;});

  // Mouse wheel zoom
  wrap.addEventListener('wheel',function(e){
    e.preventDefault();
    const delta=e.deltaY>0?-0.2:0.2;
    scale=Math.max(MIN,Math.min(MAX,scale+delta));
    if(scale===1){tx=0;ty=0;}
    clampTranslate();applyTransform();
  },{passive:false});
}

function renderCal(ca){
  const mn=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  const fd=new Date(calY,calM,1).getDay();
  const dim=new Date(calY,calM+1,0).getDate();
  const today=new Date();
  const ed={};
  C.events.forEach(ev=>{const d=new Date(ev.event_date+'T12:00:00');if(d.getFullYear()===calY&&d.getMonth()===calM){const k=d.getDate();if(!ed[k])ed[k]=[];ed[k].push(ev);}});
  const off=(fd+6)%7;
  let days='';
  ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'].forEach(d=>{days+=`<div class="cal-dow">${d}</div>`;});
  for(let i=0;i<off;i++)days+=`<div class="cal-day other-month"></div>`;
  for(let d=1;d<=dim;d++){
    const it=d===today.getDate()&&calM===today.getMonth()&&calY===today.getFullYear();
    const he=ed[d];
    days+=`<div class="cal-day ${it?'today':''} ${he?'has-event':''}" ${he?`onclick="document.getElementById('ce${d}')?.scrollIntoView({behavior:'smooth',block:'center'})"`:''}>${d}${he?`<div class="cal-dot"></div>`:''}</div>`;
  }
  const w=document.createElement('div');
  w.innerHTML=`<div class="cal-header"><button class="cal-nav" onclick="calNav(-1)">‹</button><div class="cal-month-title">${mn[calM]} ${calY}</div><button class="cal-nav" onclick="calNav(1)">›</button></div><div class="cal-grid">${days}</div><div id="cal-list"></div>`;
  ca.appendChild(w);
  const cl=w.querySelector('#cal-list');
  const evs=C.events.filter(ev=>{const d=new Date(ev.event_date+'T12:00:00');return d.getFullYear()===calY&&d.getMonth()===calM;});
  if(!evs.length){cl.innerHTML=`<div style="text-align:center;color:var(--text-soft);padding:16px;font-size:13px">Bu ay etkinlik yok</div>`;return;}
  evs.forEach(ev=>{const d=new Date(ev.event_date+'T12:00:00');const r=document.createElement('div');r.className='cal-event-row';r.id=`ce${d.getDate()}`;r.innerHTML=`<div style="font-size:20px">${ev.icon}</div><div style="flex:1;font-size:14px;font-weight:500">${gn(ev)}</div><div style="font-size:12px;color:var(--text-soft)">${(ev.event_time||'').slice(0,5)}</div>`;cl.appendChild(r);});
}

/* ── DARK MODE ── */
function toggleDark(){
  darkMode=!darkMode;
  document.documentElement.setAttribute('data-theme', darkMode?'dark':'');
  document.getElementById('dark-toggle').textContent=darkMode?'☀️':'🌙';
  const meta=document.getElementById('theme-meta');
  if(meta)meta.content=darkMode?'#060e14':'#0d3d52';
  try{localStorage.setItem('hd',darkMode?'1':'');}catch(e){}
}
function initDark(){
  try{
    const saved=localStorage.getItem('hd');
    const hour=new Date().getHours();
    const isNight=(hour>=19||hour<7);
    // Kullanıcı daha önce manuel seçtiyse ona uymaya çalış,
    // ama hiç seçmediyse (null) saate göre karar ver
    const shouldDark = saved!==null ? saved==='1' : isNight;
    if(shouldDark){
      darkMode=true;
      document.documentElement.setAttribute('data-theme','dark');
      document.getElementById('dark-toggle').textContent='☀️';
      const m=document.getElementById('theme-meta');if(m)m.content='#060e14';
    }
  }catch(e){}
}

/* ── WEATHER ── */
const WX_CODES={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};
async function fetchWeather(lat,lon){
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,weathercode,windspeed_10m&timezone=auto');
    const d=await r.json();
    const c=d.current;
    const icon=WX_CODES[c.weathercode]||'🌡️';
    const temp=Math.round(c.temperature_2m);
    document.getElementById('w-icon').textContent=icon;
    document.getElementById('w-temp').textContent=temp+'°C';
    document.getElementById('weather-bar').style.display='';
  }catch(e){console.log('Weather error:',e);}
}
function initWeather(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(
    pos=>fetchWeather(pos.coords.latitude,pos.coords.longitude),
    ()=>{
      // Konum reddedilirse otelin konumunu kullan (Antalya varsayılan)
      const lat=C.config.hotel_lat||36.5436;
      const lon=C.config.hotel_lon||32.0057;
      fetchWeather(lat,lon);
    },
    {timeout:5000}
  );
}
function refreshWeather(){
  document.getElementById('w-icon').textContent='⏳';
  initWeather();
}

function renderReqAdmin(ac){
  const filters=['all','unread','read','resolved'];

  const fbar=document.createElement('div');fbar.style.cssText='display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;';
  filters.forEach(f=>{
    const cnt=f==='all'?C.requests.length:C.requests.filter(r=>r.status===f).length;
    const b=document.createElement('button');
    b.style.cssText=`padding:6px 14px;border-radius:20px;border:1.5px solid var(--sand2);background:${reqFilter===f?'var(--palm)':'none'};color:${reqFilter===f?'white':'var(--text-soft)'};font-family:var(--font-sans);font-size:12px;cursor:pointer;`;
    b.textContent=`${labels[f]} (${cnt})`;b.onclick=()=>{reqFilter=f;renderA();};fbar.appendChild(b);

    const ts=d.toLocaleDateString('tr-TR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    const bl={unread:'Okunmadı',read:'Okundu',resolved:'Çözüldü'};
    el.innerHTML=`<div class="req-top"><span class="req-badge ${req.status}">${bl[req.status]}</span>${req.room_number?`<span style="font-size:12px;color:var(--text-soft)">🚪 ${req.room_number}</span>`:''}<span style="font-size:11px;color:var(--text-soft)">🌐 ${(req.lang||'?').toUpperCase()}</span><span class="req-time">${ts}</span></div><div class="req-msg">${req.message}</div><div class="req-act">${req.status==='unread'?`<button class="brq" style="background:rgba(26,95,122,.1);color:var(--palm)" onclick="updReq('${req.id}','read')">✓ Okundu</button>`:''}${req.status!=='resolved'?`<button class="brq" style="background:#e8f5e9;color:#2e7d32" onclick="updReq('${req.id}','resolved')">✅ Çözüldü</button>`:''}${ `<button class="brq" style="background:rgba(229,115,115,.12);color:#c0392b" onclick="delReq('${req.id}')">🗑️</button>`}</div>`;
    ac.appendChild(el);
  });
}

function handlePhoto(inp){const f=inp.files[0];if(!f)return;pendingPhoto=f;const r=new FileReader();r.onload=e=>{const p=document.getElementById('photo-prev');if(p){p.src=e.target.result;p.classList.add('show');}};r.readAsDataURL(f);}
function removePhoto(){pendingPhoto='REMOVE';const p=document.getElementById('photo-prev');if(p){p.src='';p.classList.remove('show');}}

async function uploadPhoto(file,folder,id){
  const ext=file.name.split('.').pop();
  const path=`${folder}/${id}.${ext}`;
  const{error}=await sb.storage.from(BUCKET).upload(path,file,{upsert:true,contentType:file.type});
  if(error){console.error(error);return null;}
  return sb.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;
}

    });
    console.log('Saving announcement:',{type,messages,editAnn});
    if(!Object.keys(messages).length){showToast('⚠️ En az bir dilde mesaj girin!');return;}
    const annStart=document.getElementById('f-ann-start')?.value||null;
    const annEnd=document.getElementById('f-ann-end')?.value||null;
    const annStartDate=document.getElementById('f-ann-start-date')?.value||null;
    const annEndDate=document.getElementById('f-ann-end-date')?.value||null;
    const btn=document.getElementById('save-btn');btn.disabled=true;btn.textContent='Kaydediliyor…';
    let res;
    if(editAnn){
      res=await sb.from('announcements').update({type,messages,start_time:annStart,end_time:annEnd,start_date:annStartDate,end_date:annEndDate,updated_at:new Date().toISOString()}).eq('id',editAnn.id);
    } else {
      res=await sb.from('announcements').insert([{type,messages,is_active:true,start_time:annStart,end_time:annEnd,start_date:annStartDate,end_date:annEndDate}]);
    }
    console.log('Save result:',res);
    btn.disabled=false;btn.textContent='Kaydet';
    if(res.error){showToast('❌ '+res.error.message);console.error('Ann error:',res.error);return;}
    closeModal();await fetchAll();renderA();renderAnn();showToast('✓ Duyuru kaydedildi');return;
  }

  const btn=document.getElementById('save-btn');btn.disabled=true;btn.textContent='Kaydediliyor…';
  const iconEl=document.getElementById('f-icon');if(!iconEl){btn.disabled=false;btn.textContent='Kaydet';return;}
  const icon=iconEl.value;
  const names={},descs={};
  LANGS.forEach(l=>{names[l.code]=document.getElementById(`fn-${l.code}`)?.value||'';descs[l.code]=document.getElementById(`fd-${l.code}`)?.value||'';});
  if(!names.tr&&!names.en){showToast('⚠️ TR veya EN isim girin!');btn.disabled=false;btn.textContent='Kaydet';return;}

  let photoUrl=editItem?.photo_url||null;
  const tmpId=editItem?.id||crypto.randomUUID();
  if(pendingPhoto==='REMOVE')photoUrl=null;
  else if(pendingPhoto instanceof File){const folder=editType==='outlet'?'outlets':'events';photoUrl=await uploadPhoto(pendingPhoto,folder,tmpId);}

  let error;
  if(editType==='outlet'){const menuEl=document.getElementById('f-menu');const obj={category:editCat,icon,names,descs,photo_url:photoUrl,hours:document.getElementById('f-hours')?.value||'',phone:document.getElementById('f-phone')?.value||'',dress_code:document.getElementById('f-dress')?.value||'',reservation:document.getElementById('f-reservation')?.value||'',menu_text:menuEl?menuEl.value:null};({error}=editItem?await sb.from('outlets').update(obj).eq('id',editItem.id):await sb.from('outlets').insert({...obj,id:tmpId}));}
  else if(editType==='event'){const obj={icon,names,descs,photo_url:photoUrl,event_date:document.getElementById('f-date')?.value,event_time:document.getElementById('f-time')?.value,event_end_time:document.getElementById('f-end-time')?.value||null};({error}=editItem?await sb.from('events').update(obj).eq('id',editItem.id):await sb.from('events').insert({...obj,id:tmpId}));}
  else if(editType==='service'){const svcCat=editCat==='extraservices'?'extra':'general';const obj={icon,names,infos:descs,category:svcCat};({error}=editItem?await sb.from('services').update(obj).eq('id',editItem.id):await sb.from('services').insert(obj));}

  btn.disabled=false;btn.textContent='Kaydet';
  if(error){showToast('❌ '+error.message);return;}
  closeModal();await fetchAll();renderA();renderG();showToast('✓ Kaydedildi');
}

async function delItem(type,id){
  if(!confirm('Silmek istediğinizden emin misiniz?'))return;
  let error;
  if(type==='outlet')({error}=await sb.from('outlets').delete().eq('id',id));
  else if(type==='event')({error}=await sb.from('events').delete().eq('id',id));
  else({error}=await sb.from('services').delete().eq('id',id));
  if(error){showToast('❌ '+error.message);return;}
  await fetchAll();renderA();renderG();showToast('🗑️ Silindi');
}

async function editHotelName(){
  const name=prompt('Otel adını girin:',C.hotelName);
  if(!name?.trim())return;
  const{error}=await sb.from('hotel_config').upsert({key:'hotel_name',value:name.trim()});if(!error){C.config.hotel_name=name.trim();}
  if(error){showToast('❌ '+error.message);return;}
  C.hotelName=name.trim();renderG();showToast('✓ Güncellendi');
}

function openAdminLogin(){document.getElementById('login-email').value='';document.getElementById('login-pw').value='';document.getElementById('login-error').textContent='';document.getElementById('login-overlay').classList.add('open');setTimeout(()=>document.getElementById('login-email').focus(),300);}
function closeLogin(){document.getElementById('login-overlay').classList.remove('open');}
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-pw').value;
  const btn=document.getElementById('login-btn');
  if(!email||!pw){document.getElementById('login-error').textContent='E-posta ve şifre gerekli.';return;}
  btn.disabled=true;btn.textContent='Giriş…';
  const{error}=await sb.auth.signInWithPassword({email,password:pw});
  btn.disabled=false;btn.textContent='Giriş';
  if(error){document.getElementById('login-error').textContent='Hatalı e-posta veya şifre!';return;}
  isAdmin=true;closeLogin();document.getElementById('guest-view').style.display='none';document.getElementById('admin-view').style.display='block';atab='restaurants';renderA();
}
async function doLogout(){await sb.auth.signOut();isAdmin=false;document.getElementById('admin-view').style.display='none';document.getElementById('guest-view').style.display='block';renderG();showToast('Çıkış yapıldı');}
function showGuest(){document.getElementById('admin-view').style.display='none';document.getElementById('guest-view').style.display='block';}

function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2500);}

initDark();

(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  await fetchAll();
  if(session){
    isAdmin=true;
    document.getElementById('guest-view').style.display='none';
    document.getElementById('admin-view').style.display='block';
    atab='dashboard';
    renderA();
  } else {
    renderG();
  }
  setupRT();
  initWeather();
})();

sb.auth.onAuthStateChange((event,session)=>{
  if(event==='SIGNED_OUT'){
    isAdmin=false;
    document.getElementById('admin-view').style.display='none';
    document.getElementById('guest-view').style.display='block';
    renderG();
  }
});
</script>
