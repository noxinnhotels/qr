<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Üretici</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #e8ff47;
    --accent2: #ff4757;
    --text: #f0f0f0;
    --muted: #555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 39px,
      rgba(255,255,255,0.015) 39px,
      rgba(255,255,255,0.015) 40px
    ),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 39px,
      rgba(255,255,255,0.015) 39px,
      rgba(255,255,255,0.015) 40px
    );
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 640px;
    position: relative;
    z-index: 1;
  }

  header {
    margin-bottom: 48px;
    animation: slideDown 0.6s cubic-bezier(.16,1,.3,1) both;
  }

  .logo-line {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    border: 2.5px solid var(--accent);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    gap: 3px;
    padding: 5px;
  }

  .logo-icon span {
    background: var(--accent);
    display: block;
  }
  .logo-icon span:nth-child(5) { background: transparent; }

  h1 {
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  h1 em {
    font-style: normal;
    color: var(--accent);
  }

  .tagline {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 10px;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    margin-bottom: 24px;
    animation: fadeIn 0.5s 0.2s both;
  }

  .tab-btn {
    flex: 1;
    padding: 12px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border-right: 1px solid var(--border);
    position: relative;
  }
  .tab-btn:last-child { border-right: none; }
  .tab-btn.active {
    color: var(--bg);
    background: var(--accent);
    font-weight: 700;
  }
  .tab-btn:not(.active):hover { color: var(--text); background: rgba(255,255,255,0.04); }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px;
    animation: fadeIn 0.5s 0.3s both;
  }

  .field {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input[type="text"],
  input[type="url"],
  input[type="tel"],
  input[type="email"],
  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }
  input:focus, textarea:focus { border-color: var(--accent); }

  .row { display: flex; gap: 16px; }
  .row .field { flex: 1; }

  /* STYLE OPTIONS */
  .style-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .color-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .color-group label {
    margin-bottom: 0;
  }

  input[type="color"] {
    width: 44px;
    height: 36px;
    border: 1px solid var(--border);
    background: none;
    cursor: pointer;
    padding: 2px;
  }

  .size-select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    padding: 10px 12px;
    outline: none;
    cursor: pointer;
  }

  /* GENERATE BUTTON */
  .btn-generate {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 0.05em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .btn-generate:hover { background: #d4eb30; transform: translateY(-1px); }
  .btn-generate:active { transform: translateY(0); }

  .btn-generate::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.2);
    transform: translateX(-100%);
    transition: transform 0.3s;
  }
  .btn-generate:hover::after { transform: translateX(100%); }

  /* OUTPUT */
  .output-section {
    margin-top: 28px;
    animation: fadeIn 0.5s 0.4s both;
  }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .output-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .qr-frame {
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 240px;
    position: relative;
    overflow: hidden;
  }

  .qr-frame::before,
  .qr-frame::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--accent);
    border-style: solid;
  }
  .qr-frame::before { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
  .qr-frame::after  { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }

  #qr-output {
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #qr-output canvas,
  #qr-output img {
    display: block;
    image-rendering: pixelated;
  }

  .placeholder-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
    padding: 40px;
  }

  /* DOWNLOAD BUTTONS */
  .download-row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }

  .btn-dl {
    flex: 1;
    padding: 11px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-dl:hover { border-color: var(--accent); color: var(--accent); }

  .btn-copy {
    padding: 11px 16px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-copy:hover { border-color: var(--text); color: var(--text); }
  .btn-copy.copied { border-color: var(--accent); color: var(--accent); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ANIMATIONS */
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pop {
    0%   { transform: scale(0.85); opacity: 0; }
    60%  { transform: scale(1.04); }
    100% { transform: scale(1);    opacity: 1; }
  }
  .qr-pop { animation: pop 0.35s cubic-bezier(.16,1,.3,1) both; }

  footer {
    margin-top: 48px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.1em;
    animation: fadeIn 0.5s 0.6s both;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-line">
      <div class="logo-icon">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </div>
      <h1>QR <em>Üretici</em></h1>
    </div>
    <p class="tagline">// Ücretsiz — Tarayıcıda çalışır — Veri gönderilmez</p>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('url')">URL</button>
    <button class="tab-btn" onclick="switchTab('text')">Metin</button>
    <button class="tab-btn" onclick="switchTab('contact')">İletişim</button>
    <button class="tab-btn" onclick="switchTab('wifi')">Wi-Fi</button>
    <button class="tab-btn" onclick="switchTab('sms')">SMS</button>
  </div>

  <div class="card">

    <!-- URL -->
    <div class="tab-content active" id="tab-url">
      <div class="field">
        <label>Web Adresi</label>
        <input type="url" id="input-url" placeholder="https://ornek.com" />
      </div>
    </div>

    <!-- TEXT -->
    <div class="tab-content" id="tab-text">
      <div class="field">
        <label>Metin</label>
        <textarea id="input-text" rows="4" placeholder="Buraya herhangi bir metin yazın..."></textarea>
      </div>
    </div>

    <!-- CONTACT -->
    <div class="tab-content" id="tab-contact">
      <div class="row">
        <div class="field"><label>Ad</label><input type="text" id="c-name" placeholder="Ad Soyad" /></div>
        <div class="field"><label>Telefon</label><input type="tel" id="c-phone" placeholder="+90 5xx xxx xx xx" /></div>
      </div>
      <div class="row">
        <div class="field"><label>E-posta</label><input type="email" id="c-email" placeholder="ad@ornek.com" /></div>
        <div class="field"><label>Şirket</label><input type="text" id="c-org" placeholder="Şirket Adı" /></div>
      </div>
      <div class="field"><label>Web Sitesi</label><input type="url" id="c-url" placeholder="https://" /></div>
    </div>

    <!-- WIFI -->
    <div class="tab-content" id="tab-wifi">
      <div class="row">
        <div class="field"><label>Ağ Adı (SSID)</label><input type="text" id="w-ssid" placeholder="Wi-Fi Adı" /></div>
        <div class="field"><label>Şifre</label><input type="text" id="w-pass" placeholder="••••••••" /></div>
      </div>
      <div class="field">
        <label>Güvenlik</label>
        <select class="size-select" id="w-sec" style="width:100%">
          <option value="WPA">WPA/WPA2</option>
          <option value="WEP">WEP</option>
          <option value="">Şifresiz</option>
        </select>
      </div>
    </div>

    <!-- SMS -->
    <div class="tab-content" id="tab-sms">
      <div class="row">
        <div class="field"><label>Telefon Numarası</label><input type="tel" id="s-phone" placeholder="+90 5xx xxx xx xx" /></div>
      </div>
      <div class="field"><label>Mesaj</label><textarea id="s-msg" rows="3" placeholder="SMS içeriği..."></textarea></div>
    </div>

    <!-- STYLE ROW -->
    <div style="border-top: 1px solid var(--border); margin: 20px 0 20px;"></div>
    <div class="style-row">
      <div class="color-group">
        <label>QR Rengi</label>
        <input type="color" id="qr-color" value="#000000">
      </div>
      <div class="color-group">
        <label>Arka Plan</label>
        <input type="color" id="bg-color" value="#ffffff">
      </div>
      <div class="color-group" style="flex:1">
        <label>Boyut</label>
        <select class="size-select" id="qr-size" style="width:100%">
          <option value="200">200×200</option>
          <option value="256" selected>256×256</option>
          <option value="320">320×320</option>
          <option value="400">400×400</option>
          <option value="512">512×512</option>
        </select>
      </div>
      <div class="color-group">
        <label>Hata Düz.</label>
        <select class="size-select" id="qr-ec">
          <option value="L">Düşük</option>
          <option value="M" selected>Orta</option>
          <option value="Q">Yüksek</option>
          <option value="H">Max</option>
        </select>
      </div>
    </div>

    <button class="btn-generate" onclick="generateQR()">⬛ QR Kodu Oluştur</button>
  </div>

  <!-- OUTPUT -->
  <div class="output-section">
    <div class="output-header">
      <span class="output-label">// Çıktı</span>
    </div>
    <div class="qr-frame">
      <div id="qr-output">
        <p class="placeholder-text">QR kodu burada görünecek</p>
      </div>
    </div>
    <div class="download-row" id="dl-row" style="display:none">
      <button class="btn-dl" onclick="downloadPNG()">↓ PNG İndir</button>
      <button class="btn-dl" onclick="downloadSVG()">↓ SVG İndir</button>
      <button class="btn-copy" id="copy-btn" onclick="copyToClipboard()">Kopyala</button>
    </div>
  </div>

  <footer>© 2025 QR Üretici — Tüm işlemler cihazınızda gerçekleşir</footer>
</div>

<script>
let currentTab = 'url';
let lastQRText = '';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['url','text','contact','wifi','sms'][i] === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}

function getQRText() {
  switch(currentTab) {
    case 'url': {
      let v = document.getElementById('input-url').value.trim();
      if (v && !v.startsWith('http')) v = 'https://' + v;
      return v;
    }
    case 'text':
      return document.getElementById('input-text').value.trim();
    case 'contact': {
      const n = document.getElementById('c-name').value.trim();
      const p = document.getElementById('c-phone').value.trim();
      const e = document.getElementById('c-email').value.trim();
      const o = document.getElementById('c-org').value.trim();
      const u = document.getElementById('c-url').value.trim();
      if (!n && !p && !e) return '';
      return `BEGIN:VCARD\nVERSION:3.0\nFN:${n}\nORG:${o}\nTEL:${p}\nEMAIL:${e}\nURL:${u}\nEND:VCARD`;
    }
    case 'wifi': {
      const s = document.getElementById('w-ssid').value.trim();
      const p = document.getElementById('w-pass').value;
      const t = document.getElementById('w-sec').value;
      if (!s) return '';
      return `WIFI:T:${t};S:${s};P:${p};;`;
    }
    case 'sms': {
      const p = document.getElementById('s-phone').value.trim();
      const m = document.getElementById('s-msg').value.trim();
      if (!p) return '';
      return `smsto:${p}:${m}`;
    }
  }
  return '';
}

function generateQR() {
  const text = getQRText();
  if (!text) { alert('Lütfen gerekli alanları doldurun.'); return; }

  lastQRText = text;
  const size = parseInt(document.getElementById('qr-size').value);
  const fgColor = document.getElementById('qr-color').value;
  const bgColor = document.getElementById('bg-color').value;
  const ec = document.getElementById('qr-ec').value;

  const output = document.getElementById('qr-output');
  output.innerHTML = '';

  const wrapper = document.createElement('div');
  wrapper.className = 'qr-pop';

  new QRCode(wrapper, {
    text,
    width: size,
    height: size,
    colorDark: fgColor,
    colorLight: bgColor,
    correctLevel: QRCode.CorrectLevel[ec]
  });

  output.appendChild(wrapper);
  document.getElementById('dl-row').style.display = 'flex';
}

function getCanvas() {
  return document.querySelector('#qr-output canvas');
}

function downloadPNG() {
  const canvas = getCanvas();
  if (!canvas) return;
  const link = document.createElement('a');
  link.download = 'qr-kodu.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function downloadSVG() {
  const canvas = getCanvas();
  if (!canvas) return;
  const size = canvas.width;
  const imgData = canvas.toDataURL('image/png');
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${size}" height="${size}"><image width="${size}" height="${size}" xlink:href="${imgData}"/></svg>`;
  const blob = new Blob([svg], {type:'image/svg+xml'});
  const link = document.createElement('a');
  link.download = 'qr-kodu.svg';
  link.href = URL.createObjectURL(blob);
  link.click();
}

function copyToClipboard() {
  const canvas = getCanvas();
  if (!canvas) return;
  canvas.toBlob(blob => {
    try {
      navigator.clipboard.write([new ClipboardItem({'image/png': blob})]).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = '✓ Kopyalandı';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Kopyala'; btn.classList.remove('copied'); }, 2000);
      });
    } catch(e) {
      alert('Bu tarayıcı panoya kopyalamayı desteklemiyor. PNG indirin.');
    }
  });
}

// Enter ile oluştur
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) generateQR();
});
</script>
</body>
</html>
